<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reveal js studio</title>
  <style>
    .container {
      position: relative;
      overflow: hidden;
      width: 500px;
      padding-top: 281.25px; /* 16:9 Aspect Ratio (divide 9 by 16 = 0.5625) */
    }

    /* Then style the iframe to fit in the container div with full height and width */
    .responsive-iframe {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 100%;
    }

    /* 2 column form grid layout */
    .form-grid {
      display: grid;
      grid-template-columns: 350px 150px;
    }

    .form-button {
      padding: 2px;
      margin: 10px 10px 0 0;
    }

    .slide-location {
      width: 500px
    }
  </style>
  <link href="css/tabulator.min.css" rel="stylesheet" />
</head>
<body>
  <form>
    <label for="slideDeckId">slide deck name</label>
    <input class="slide-location" type="text" id="slideDeckId" name="slideDeckId"
      placeholder="deck-id" />
    <button type="button" id="slideDeckIdLoadButton" class="form-button">Load</button>
  </form>
  <div id="slidesTable">
    <h3>Slides tags</h3>
  </div>

  <script type="text/javascript" src="lib/tabulator.min.js"></script>
  <script type="module" src="lib/sc-connection.js"></script>

  <script type="module">
    import './lib/obsApiProxy.js';
    import {loadTable} from './lib/setupTable.js';
    import {SyncService} from './lib/sync-service.js';
    import {parseLayoutName} from './lib/layout-utils.js';

    const LAYOUT_FILE = 'apps/slide-studio-app/layouts.json';
    let cachedLayouts = null;

    // --- Global Variables ---
    window.slideDeckId = undefined;
    let slideStateStr = ''; // To track Reveal.js state for changes
    window.slidesArray = [];
    let dropDownOptions = {};
    let selectedRowNumber = 0;
    let slidesLoaded = false;
    let tableLoaded = false;
    let isIndexing = false;
    let currentDeckUrl = '';

    // --- Function Definitions ---

    /**
     * Fetches custom camera shapes from the JSON storage.
     * @returns {Promise<Array<string>>}
     */
    async function fetchJsonCameraShapes() {
      try {
        const response = await window.scSocket.invoke('readFile', { 
          path: 'apps/slide-studio-app/camera_shapes.json' 
        });
        if (response && response.content) {
          const shapes = JSON.parse(response.content);
          return Object.keys(shapes);
        }
      } catch (e) {}
      return [];
    }

    /**
     * Centralized command handler and broadcaster.
     * @param {string} eventName The command/event name.
     * @param {Object} msgParam Payload.
     * @param {string} origin 'viewer', 'studio', or 'other'.
     */
    window.broadcastSlidesCommand = async function(eventName, msgParam,
        origin = 'studio') {
      // Handle OBS-specific tags in the Studio brain
      if (eventName === 'slide-changed') {
        const customLayoutActive = await processTags(msgParam);

        // Sync to other slide-views
        SyncService.publishSync({
          url: currentDeckUrl,
          slideState: msgParam.slideState,
          indexh: msgParam.indexh,
          indexv: msgParam.indexv,
          indexf: msgParam.indexf,
          scene: msgParam.scene,
          slidePosition: msgParam.slidePosition,
          cameraShape: msgParam.cameraShape,
          customLayoutActive: !!customLayoutActive,
        });
      }

      if (eventName === 'set-slides-studio-url') {
        SyncService.publishSync({
          url: msgParam.url,
        });
      }

      try {
        // Send to viewer only if NOT originating from viewer
        if (origin !== 'viewer') {
          await obsWss.publish('studio_to_viewer', eventName, msgParam);
        }

        // Always broadcast to the general channel for other overlays
        await obsWss.publish('slides_broadcast', eventName, msgParam);

        // Legacy support for custom_slidesCommands
        await obsWss.publish('custom_slidesCommands', eventName, msgParam);
      } catch (e) {}
    };

    /**
     * Fetches metadata from OBS to populate dropdowns.
     */
    async function fetchOBSMetadata() {
      try {
        // Get Scene options
        try {
          const sceneList = await window.obsWss.call('GetSceneList');
          dropDownOptions.scene = sceneList.scenes
              .filter((s) => s.sceneName.startsWith('Scene'))
              .map((s) => s.sceneName);
        } catch (e) {}

        // Get Camera Position options
        try {
          const cameraSources = await obsWss.call('GetSceneItemList',
              {sceneName: 'Camera Position'});
          dropDownOptions.cameraPosition =
              cameraSources.sceneItems.map((s) => s.sourceName);
        } catch (e) {}

        // Get Slide Position options
        try {
          const settings = await obsWss.call('GetInputSettings',
              {inputName: 'slides'});
          if (settings && settings.inputSettings && settings.inputSettings.css) {
            const regex = /\/\*(.*?)\*\//s;
            const match = settings.inputSettings.css.match(regex);
            if (match && match[1]) {
              dropDownOptions.slidePosition = JSON.parse(match[1].trim());
            }
          }
        } catch (e) {}

        // Get Camera Shape options
        try {
          const jsonShapes = await fetchJsonCameraShapes();
          const settings = await obsWss.call('GetInputSettings',
              {inputName: 'camera shapes'});
          
          let obsShapes = ['none', 'square', 'circle', 'pulsating-square',
                    'pulsating-circle'];

          if (settings && settings.inputSettings && settings.inputSettings.css) {
            const regex = /\/\*(.*?)\*\//s;
            const match = settings.inputSettings.css.match(regex);
            if (match && match[1]) {
              obsShapes = JSON.parse(match[1].trim());
            }
          }
          
          // Merge and de-duplicate
          dropDownOptions.cameraShape = [...new Set([...obsShapes, ...jsonShapes])];
          
        } catch (e) {
          const jsonShapes = await fetchJsonCameraShapes();
          const obsShapes = ['none', 'square', 'circle', 'pulsating-square',
                'pulsating-circle'];
          dropDownOptions.cameraShape = [...new Set([...obsShapes, ...jsonShapes])];
        }

        // Force refresh table if we have data
        if (window.table || (window.slidesArray &&
            window.slidesArray.length > 0) || (window.slideDeckId &&
            localStorage.getItem(window.slideDeckId))) {
          loadTable(dropDownOptions);
        }
      } catch (e) {}
    }

    /**
     * Processes slide tags and triggers OBS/CSS actions.
     * @param {Object} currentSlide Current slide data.
     * @return {boolean} True if a custom layout was applied.
     */
    async function processTags(currentSlide) {
      const batch = [];
      let customLayoutApplied = false;

      if (currentSlide.scene) {
        batch.push({
          requestType: 'SetCurrentProgramScene',
          requestData: {sceneName: currentSlide.scene},
        });

        // Custom Layout Logic
        const layoutName = parseLayoutName(currentSlide.scene);
        if (layoutName) {
          try {
            // Load layouts if not cached
            if (!cachedLayouts) {
              const result = await window.scSocket.invoke('readFile',
                  {path: LAYOUT_FILE});
              if (result && result.content) {
                cachedLayouts = JSON.parse(result.content);
              }
            }

            if (cachedLayouts) {
              // Case-insensitive match for the layout name
              const exactName = Object.keys(cachedLayouts).find(
                  (k) => k.toLowerCase() === layoutName.toLowerCase()
              );

              if (exactName) {
                const layout = cachedLayouts[exactName];
                console.warn(`[Studio] Applying custom layout: ${exactName}`);

                // Broadcast via SocketCluster
                window.scSocket.transmitPublish('apply-custom-layout', {
                  name: exactName,
                  styles: layout.styles,
                  parent: layout.parent,
                });
                customLayoutApplied = true;
              }
            }
          } catch (e) {
            console.error('[Studio] Failed to load/apply custom layout:', e);
          }
        }
      }
      if (currentSlide.cameraPosition) {
        const sceneName = 'Camera Position';
        try {
          const sceneItems = await obsWss.call('GetSceneItemList', {sceneName});
          if (sceneItems && sceneItems.sceneItems) {
            sceneItems.sceneItems.forEach((item) => {
              batch.push({
                requestType: 'SetSceneItemEnabled',
                requestData: {
                  sceneName,
                  sceneItemId: item.sceneItemId,
                  sceneItemEnabled: item.sourceName ===
                      currentSlide.cameraPosition,
                },
              });
            });
          }
        } catch (e) {}
      }

      if (batch.length > 0) {
        try {
          await obsWss.callBatch(batch);
        } catch (err) {}
      }

      return customLayoutApplied;
    }

    /**
     * Handles keyboard-based table navigation.
     * @param {number} keyCode Keyboard code.
     */
    window.handleKeyboardNavigation = function(keyCode) {
      if (!window.table) return;
      const selectedRows = window.table.getSelectedRows();
      if (selectedRows.length === 0) return;

      const currentRow = selectedRows[0];
      let targetRow = null;

      switch (keyCode) {
        case 37: targetRow = currentRow.getPrevRow(); break;
        case 39: targetRow = currentRow.getNextRow(); break;
        case 32: targetRow = currentRow.getNextRow(); break;
        case 38: targetRow = currentRow.getPrevRow(); break;
        case 40: targetRow = currentRow.getNextRow(); break;
        case 27: window.table.deselectRow(); return;
      }

      if (targetRow) {
        window.table.deselectRow();
        targetRow.select();
        window.filterRowData(targetRow.getData());
      }
    };

    /**
     * Sends a message to the parent window.
     * @param {Object} message Message payload.
     */
    window.sendMessageToParent = function(message) {
      window.parent.postMessage(JSON.stringify(message),
          window.location.origin);
    };

    /**
     * Triggers a method on the viewer iframe.
     * @param {string} method Method name.
     * @param {Array} args Method arguments.
     */
    window.triggerIframeMethod = function(method, args = []) {
      // If navigation is triggered manually in Studio, update the viewer
      obsWss.publish('studio_to_viewer', 'navigate', {method, args});
    };

    /**
     * Updates the global deck ID from the UI.
     */
    window.updateSlideName = function() {
      window.slideDeckId = document.getElementById('slideDeckId').value;
    };

    /**
     * Loads the saved table from local storage.
     */
    window.loadSavedTable = function() {
      if (!window.slideDeckId) return;
      const localSavedTable = localStorage.getItem(window.slideDeckId);
      if (localSavedTable) {
        window.slidesArray = JSON.parse(localSavedTable);
        slidesLoaded = true;
        tableLoaded = true;
        loadTable(dropDownOptions);
      }
    };

    /**
     * Filters row data and triggers slide changes.
     * @param {Object} rowData Raw row data.
     */
    window.filterRowData = function(rowData) {
      const row = Object.fromEntries(
          Object.entries(rowData).filter(([key, value]) => {
            if (key === 'cameraShape' && rowData.hasOwnProperty(key)) {
              return true;
            }
            return value != undefined && `${value}`.length > 0;
          })
      );

      // Track state to prevent re-broadcast loops
      if (row.slideState) {
        slideStateStr = row.slideState;
        const args = row.slideState.split(',').map((x) => Number(x));
        window.triggerIframeMethod('slide', args);
      }

      // Broadcast to both viewer and broadcast overlays
      window.broadcastSlidesCommand('slide-changed', row);
    };


    // --- Event Listeners ---

    window.addEventListener('DOMContentLoaded', (event) => {
      document.getElementById('slideDeckId')
          .addEventListener('change', window.updateSlideName);
      document.getElementById('slideDeckIdLoadButton')
          .addEventListener('click', window.loadSavedTable);

      obsWss.connect().then(() => {
        fetchOBSMetadata();
        window.sendMessageToParent({
          namespace: 'slides-studio',
          eventName: 'frameReady',
          frame: 'studio',
        });

        // Robustness: If we haven't received a deck ID within 3s, request it
        setTimeout(() => {
          if (!window.slideDeckId) {
            obsWss.publish('custom_slidesCommands', 'request-init-data', {});
          }
        }, 3000);
      }).catch((e) => {});
    });

    // Unified SocketCluster listener via obsWss
    obsWss.on('keyboardPress', (eventData) => {
      if (eventData.key) {
        window.handleKeyboardNavigation(eventData.keyCode || eventData.key);
      }
    });

    // Sync OBS scene changes back to the table
    obsWss.on('CurrentProgramSceneChanged', (data) => {
      if (window.table) {
        const rows = window.table.searchRows('scene', '=', data.sceneName);
        if (rows.length > 0) {
          const targetRow = rows[0];
          const selectedRows = window.table.getSelectedRows();

          // Only update if it's actually different to avoid loops
          if (selectedRows.length === 0 ||
              selectedRows[0].getIndex() !== targetRow.getIndex()) {
            window.table.deselectRow();
            targetRow.select();
            window.table.scrollToRow(targetRow, 'center', false);
          }
        }
      }
    });

    // Listen for setup commands from the Viewer Host
    obsWss.on('slides_broadcast', (data) => {
      const eventName = data.eventName;
      const payload = data.msgParam;

      if (eventName === 'set-deck-id') {
        window.slideDeckId = payload.deckId;
        document.getElementById('slideDeckId').value = window.slideDeckId;

        if (localStorage.getItem(window.slideDeckId)) {
          window.loadSavedTable();
        } else if (!slidesLoaded) {
          window.slidesArray = [];
          window.triggerIframeMethod('slide', [0, 0]);
          window.triggerIframeMethod('getState');
        }
      }

      if (eventName === 'set-slides-studio-url') {
        currentDeckUrl = payload.url;
        // Relay the URL to the broadcast navigation channel
        window.broadcastSlidesCommand('set-slides-studio-url',
            {url: payload.url});
      }

      if (eventName === 'next-slide') {
        window.handleKeyboardNavigation(39); // Simulate right arrow
      }

      if (eventName === 'previous-slide') {
        window.handleKeyboardNavigation(37); // Simulate left arrow
      }
    });

    // Legacy support for slidesCommands
    obsWss.on('slidesCommands', async (data) => {
      if (data.eventName === 'request-init-data') return;
    });

    // Unified listener for viewer reporting its state
    const handleStateUpdate = async (data) => {
      handleSlideStateFromIframe(data);
    };
    obsWss.on('viewer_to_studio', handleStateUpdate);
    obsWss.on('currentSlide_to_studio', handleStateUpdate);

    /**
     * Handles slide state updates from the viewer iframe.
     * @param {Object} data Message payload.
     */
    async function handleSlideStateFromIframe(data) {
      try {
        const eventName = data.eventName;
        const payload = data.msgParam;

        if (eventName === 'reveal-event') {
          const revealData = payload;

          // Indexing Logic (Triggered if slidesLoaded is false)
          if (!slidesLoaded) {
            const isStartingEvent = revealData.eventName === 'ready' ||
                (revealData.eventName === 'slidechanged' &&
                 window.slidesArray.length === 0) ||
                (revealData.eventName === 'callback' &&
                 (revealData.method === 'slide' ||
                  revealData.method === 'getState') &&
                 window.slidesArray.length === 0);

            if (isStartingEvent) {
              isIndexing = true;
              window.slidesArray = [];
              revealData.state = revealData.state || revealData.result ||
                  {indexh: 0, indexv: 0};
              addSlideToIndexedArray(revealData);
              return;
            }

            if (revealData.eventName === 'callback' &&
                revealData.method === 'getSlideNotes') {
              return;
            }

            if (revealData.eventName === 'callback' &&
                revealData.method === 'getProgress') {
              if (revealData.result === 1) {
                slidesLoaded = true;
                tableLoaded = true;
                isIndexing = false;
                window.triggerIframeMethod('slide', [0, 0]);
                loadTable(dropDownOptions);
                // Notify other views
                obsWss.publish('slides_broadcast', 'indexing-complete', {});
              } else {
                window.triggerIframeMethod('next');
              }
              return;
            }

            if ((revealData.eventName === 'slidechanged' ||
                 revealData.eventName === 'ready') &&
                window.slidesArray.length > 0) {
              if (!revealData.state) return;
              const state = `${revealData.state.indexh},${revealData.state.indexv}`;
              if (!window.slidesArray.find((s) => s.slideState === state)) {
                addSlideToIndexedArray(revealData);
              } else {
                window.triggerIframeMethod('getProgress');
              }
              return;
            }

            if (['fragmentshown', 'fragmenthidden']
                .includes(revealData.eventName)) {
              addFragmentToIndexedArray(revealData);
              return;
            }
          }

          // Navigation Sync (After indexing)
          if (revealData.state && !isIndexing) {
            let stateString =
                `${revealData.state.indexh},${revealData.state.indexv}`;
            if (revealData.state.indexf !== undefined &&
                revealData.state.indexf > -1) {
              stateString += `,${revealData.state.indexf}`;
            }

            if (stateString !== slideStateStr) {
              slideStateStr = stateString;

              if (window.table) {
                const rows = window.table.searchRows('slideState', '=',
                    stateString);
                if (rows.length > 0) {
                  const targetRow = rows[0];
                  window.table.deselectRow();
                  targetRow.select();
                  selectedRowNumber = targetRow.getPosition();
                  window.table.scrollToRow(targetRow, 'center', false);

                  // Broadcast the master message only to broadcast navigation
                  // Pass 'viewer' as origin to prevent loops
                  window.broadcastSlidesCommand('slide-changed',
                      targetRow.getData(), 'viewer');
                }
              }
            }
          }

          if (['overviewhidden', 'overviewshown']
              .includes(revealData.eventName)) {
            await processTags({overview: revealData.state.overview});
          }
        }
      } catch (err) {}
    }

    window.addEventListener('message', async (event) => {
      if (event.origin !== window.location.origin) return;

      let data;
      try {
        data = JSON.parse(event.data);
      } catch (e) {
        return;
      }

      if (data.namespace === 'speakerview' && data.message === 'set-deck-id') {
        window.slideDeckId = data.deckId;
        document.getElementById('slideDeckId').value = window.slideDeckId;
        if (!slidesLoaded && localStorage.getItem(window.slideDeckId)) {
          window.loadSavedTable();
        }
      }
    });

    /**
     * Adds a slide to the indexed array.
     * @param {Object} data Slide data.
     */
    function addSlideToIndexedArray(data) {
      if (!data.state) return;
      const attrs = data.attributes || {};
      const state = `${data.state.indexh},${data.state.indexv}`;

      window.slidesArray.push({
        slideId: attrs.slideId,
        slideState: state,
        slideName: attrs.slideName,
        slidePosition: attrs.slidePosition,
        cameraPosition: attrs.cameraPosition,
        cameraShape: attrs.cameraShape,
        scene: attrs.scene,
      });

      window.triggerIframeMethod('getProgress');
    }

    /**
     * Adds a fragment to the indexed array.
     * @param {Object} data Fragment data.
     */
    function addFragmentToIndexedArray(data) {
      if (!data.state) return;
      const state = `${data.state.indexh},${data.state.indexv}`;
      const foundSlide = window.slidesArray.find((s) => s.slideState === state);
      if (foundSlide) {
        if (!foundSlide._children) foundSlide._children = [];

        const attrs = data.attributes || {};
        const fragState = `${state},${data.state.indexf}`;

        if (!foundSlide._children.find((f) => f.slideState === fragState)) {
          foundSlide._children.push({
            slideState: fragState,
            slideName: attrs.fragmentName || attrs.slideName,
            slidePosition: attrs.fragmentPosition || attrs.slidePosition,
            cameraPosition: attrs.fragmentCameraPosition || attrs.cameraPosition,
            cameraShape: attrs.fragmentCameraShape || attrs.cameraShape,
            scene: attrs.fragmentScene || attrs.scene,
          });
        }
      }
      window.triggerIframeMethod('getProgress');
    }
  </script>
</body>
</html>
