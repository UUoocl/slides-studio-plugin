<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal js studio</title>
    <style>
        .container {
            position: relative;
            overflow: hidden;
            width: 500px;
            padding-top: 281.25px; /* 16:9 Aspect Ratio (divide 9 by 16 = 0.5625) */
        }

        /* Then style the iframe to fit in the container div with full height and width */
        .responsive-iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
        }

        /* 2 column form grid layout         */
        .form-grid {
            display:grid;
            grid-template-columns: 350px 150px;
        }

        .form-button{
            padding: 2px;
            margin: 10px 10px 0 0;
        }
        
        .slide-location{
            width: 500px
        }
    </style>
     <link href="css/tabulator.min.css" rel="stylesheet" />
   
</head>
<body>

    <form>
        <label for="slideDeckId">slide deck name</label> 
        <input class= "slide-location" type="text" id="slideDeckId" name="slideDeckId"
        placeholder="deck-id" />
        <button type="button" id="slideDeckIdLoadButton" class="form-button">Load</button>
    </form>
        <div id="slidesTable" >
            <h3>Slides tags</h3>
    </div>
 
        
        <script type="text/javascript" src="lib/tabulator.min.js"></script>
        <script src="lib/obsApiProxy.js"></script>
        <script src='lib/setupTable.js'></script>
        <script>
            // --- Global Variables ---
            window.slideDeckId = undefined;
            let slideState = ''; // To track Reveal.js state for changes
            window.slidesArray = [];
            let dropDownOptions = {};
            let selectedRowNumber = 0;
            let slidesLoaded = false;
            let tableLoaded = false;

            // --- Function Definitions ---

            // --- broadcastSlidesCommand (Centralized command handler & broadcaster) ---
            async function broadcastSlidesCommand(eventName, msgParam) {
                console.log(`[Studio] Attempting to handle command: ${eventName}`, msgParam);
                
                // Handle OBS-specific tags in the Studio brain
                if (eventName === "slide-changed") {
                    await processTags(msgParam);
                }

                try {
                    await obsWss.broadcastSlidesCommand(eventName, msgParam);
                } catch (e) {
                    console.error("[Studio] Failed to broadcast command via SSE", e);
                }
            }

            async function fetchOBSMetadata() {
                console.log("[Studio] Fetching OBS metadata...");
                try {
                    // Get Scene options
                    const sceneList = await obsWss.call("GetSceneList");
                    dropDownOptions.scene = sceneList.scenes
                        .filter(s => s.sceneName.startsWith("Scene"))
                        .map(s => s.sceneName);
                    
                    // Get Camera Position options
                    try {
                        const cameraSources = await obsWss.call("GetSceneItemList", { sceneName: "Camera Position" });
                        dropDownOptions.cameraPosition = cameraSources.sceneItems.map(s => s.sourceName);
                    } catch (e) { console.warn("[Studio] Could not fetch Camera Positions"); }

                    // Get Slide Position options
                    try {
                        const settings = await obsWss.call("GetInputSettings", { inputName: 'slides' });
                        if (settings && settings.inputSettings && settings.inputSettings.css) {
                            const regex = /\/\*(.*?)\*\//s;
                            const match = settings.inputSettings.css.match(regex);
                            if (match && match[1]) {
                                dropDownOptions.slidePosition = JSON.parse(match[1].trim());
                            }
                        }
                    } catch (e) { console.warn("[Studio] Could not fetch Slide Positions"); }

                    // Get Camera Shape options
                    try {
                        const settings = await obsWss.call("GetInputSettings", { inputName: 'camera shapes' });
                        if (settings && settings.inputSettings && settings.inputSettings.css) {
                            const regex = /\/\*(.*?)\*\//s;
                            const match = settings.inputSettings.css.match(regex);
                            if (match && match[1]) {
                                dropDownOptions.cameraShape = JSON.parse(match[1].trim());
                            } else {
                                console.warn("[Studio] 'camera shapes' input found, but no valid JSON array in CSS comment. Using default camera shapes.");
                                dropDownOptions.cameraShape = ["none", "square", "circle", "pulsating-square", "pulsating-circle"];
                            }
                        } else {
                            dropDownOptions.cameraShape = ["none", "square", "circle", "pulsating-square", "pulsating-circle"];
                        }
                    } catch (e) { 
                        console.warn("[Studio] Could not fetch Camera Shapes from OBS. Using default camera shapes.", e);
                        dropDownOptions.cameraShape = ["none", "square", "circle", "pulsating-square", "pulsating-circle"];
                    }


                    console.log("[Studio] OBS metadata fetched:", dropDownOptions);
                    // Update table if it already exists, otherwise it will use these options when created
                    if (window.table && typeof window.loadTable === 'function') {
                        window.loadTable(dropDownOptions);
                    }
                } catch (e) {
                    console.error("[Studio] Failed to fetch OBS metadata", e);
                }
            }

            async function processTags(currentSlide) {
                const batch = [];
                
                if (currentSlide.scene) {
                    console.log("[Studio] Adding scene change to batch:", currentSlide.scene);
                    batch.push({
                        requestType: "SetCurrentProgramScene",
                        requestData: { sceneName: currentSlide.scene }
                    });
                };

                if (currentSlide.cameraPosition) { 
                    const sceneName = "Camera Position";
                    try {
                        console.log("[Studio] Getting scene items for Camera Position to update visibility...");
                        const sceneItems = await obsWss.call("GetSceneItemList", { sceneName });
                        sceneItems.sceneItems.forEach((item) => {
                            batch.push({
                                requestType: "SetSceneItemEnabled",
                                requestData: {
                                    sceneName,
                                    sceneItemId: item.sceneItemId,
                                    sceneItemEnabled: item.sourceName === currentSlide.cameraPosition
                                }
                            });
                        });
                    } catch (e) {
                        console.error("[Studio] Failed to get camera scene items", e);
                    }
                };

                if (batch.length > 0) {
                    console.log(`[Studio] Executing OBS batch request with ${batch.length} commands...`);
                    try {
                        await obsWss.callBatch(batch);
                        console.log("[Studio] OBS batch request successful.");
                    } catch (err) {
                        console.error("[Studio] OBS batch request failed:", err);
                    }
                }
            }

            // Global function to handle keyboard navigation
            function handleKeyboardNavigation(keyCode) {
                // Find current slide (selected row in Tabulator)
                if (!window.table) return;
                const selectedRows = window.table.getSelectedRows();
                if (selectedRows.length === 0) return;

                let currentRow = selectedRows[0];
                let targetRow = null;

                switch (keyCode) {
                    case 37: // Left Arrow
                        targetRow = currentRow.getPrevRow();
                        break;
                    case 39: // Right Arrow
                        targetRow = currentRow.getNextRow();
                        break;
                    case 32: // Spacebar
                        targetRow = currentRow.getNextRow();
                        break;
                    case 38: // Up Arrow
                        targetRow = currentRow.getPrevRow();
                        break;
                    case 40: // Down Arrow
                        targetRow = currentRow.getNextRow();
                        break;
                    case 13: // Enter
                        break;
                    case 27: // Escape
                        window.table.deselectRow();
                        return;
                }

                if (targetRow) {
                    window.table.deselectRow();
                    window.table.selectRow(targetRow);
                    filterRowData(targetRow.getData());
                }
            }

            function sendMessageToParent(message) {
                window.parent.postMessage(JSON.stringify(message), window.location.origin);
            }

            function triggerIframeMethod(method, args = []) {
                broadcastSlidesCommand('navigate', { method, args });
            }

            function updateSlideName() {
                window.slideDeckId = document.getElementById("slideDeckId").value;
            }

            function loadSavedTable() {
                if (!window.slideDeckId) return;
                let localSavedTable = localStorage.getItem(window.slideDeckId);
                if (localSavedTable) {
                    window.slidesArray = JSON.parse(localSavedTable);
                    slidesLoaded = true;
                    tableLoaded = true;
                    if (typeof window.loadTable === 'function') {
                        window.loadTable(dropDownOptions);
                    }
                } else {
                    console.log("[Studio] No saved table found for", window.slideDeckId);
                }
            }

            function filterRowData(rowData){
                // Explicitly include cameraShape if it exists, even if it's an empty string.
                // Tabulator might store unselected dropdowns as empty strings.
                const row = Object.fromEntries(
                    Object.entries(rowData).filter(([key, value]) => {
                        if (key === 'cameraShape' && rowData.hasOwnProperty(key)) {
                            return true; // Always include cameraShape if present in original rowData
                        }
                        return value != undefined && `${value}`.length > 0;
                    })
                );
                
                // Trigger navigation via SSE (slideSync_SpeakerView_Browser.js handles this)
                if (row.slideState) {
                    const args = row.slideState.split(',').map(x => Number(x));
                    triggerIframeMethod('slide', args);
                }

                console.log("[Studio] Broadcasting slide-changed event with row data:", row);
                // Broadcast via SSE for OBS and other views
                broadcastSlidesCommand('slide-changed', row);
            }

            
            // --- Event Listeners ---

            // Connect to OBS proxy when studio.html loads
            obsWss.connect().then(() => {
                console.log("[Studio] Connected to OBS proxy. Fetching metadata...");
                fetchOBSMetadata();
            }).catch(e => {
                console.warn("[Studio] Could not connect to OBS proxy on load. Metadata fetch skipped.", e);
            });
            
            window.addEventListener("DOMContentLoaded", (event) => {
                document.getElementById("slideDeckId").addEventListener('change', updateSlideName);
                document.getElementById("slideDeckIdLoadButton").addEventListener('click', loadSavedTable);
            });
            
            // Unified SSE listener for all plugin events (keyboard, slides, obs, etc.)
            console.log("[Studio] Initializing unified SSE connection...");
            const unifiedSse = new EventSource('/api/events');
            
            // Share this connection with the OBS proxy to save browser connection slots
            obsWss.eventSource = unifiedSse;

            unifiedSse.addEventListener('keyboardPress', (e) => {
                try {
                    const eventData = JSON.parse(e.data);
                    console.log("[Studio] Keyboard press received:", eventData.key);
                    if (eventData.key) {
                        handleKeyboardNavigation(eventData.keyCode || eventData.key);
                    }
                } catch (err) {
                    console.error("[Studio] Error processing keyboard SSE event:", err, e.data);
                }
            });

            unifiedSse.addEventListener('slidesCommands', async (e) => {
                try {
                    const data = JSON.parse(e.data);
                    const eventName = data.eventName;
                    const payload = data.msgParam;

                    // --- Handle Deck Context ---
                    if (eventName === 'set-deck-id') {
                        console.log("[Studio] Assigned deck ID via SSE:", payload.deckId);
                        window.slideDeckId = payload.deckId;
                        document.getElementById("slideDeckId").value = window.slideDeckId;
                        if (!slidesLoaded && localStorage.getItem(window.slideDeckId)) {
                            loadSavedTable();
                        }
                    }

                    // --- Handle Reveal Events (Sync Reveal -> Studio) ---
                    if (eventName === 'reveal-event') {
                        const revealData = payload;

                        // --- Indexing Logic ---
                        if (!slidesLoaded) {
                            if (revealData.eventName === 'ready') {
                                console.log("[Studio] Starting deck indexing...");
                                window.slidesArray = [];
                                addSlideToIndexedArray(revealData);
                            }

                            if (revealData.eventName === 'callback' && revealData.method === 'getProgress') {
                                if (revealData.result === 1) {
                                    console.log("[Studio] Indexing complete.");
                                    slidesLoaded = true;
                                    tableLoaded = true;
                                    triggerIframeMethod('slide', [0, 0]);
                                    if (typeof window.loadTable === 'function') {
                                        window.loadTable(dropDownOptions);
                                    }
                                    broadcastSlidesCommand('indexing-complete', {});
                                } else {
                                    triggerIframeMethod('next');
                                }
                            }

                            if (revealData.eventName === 'slidechanged') {
                                addSlideToIndexedArray(revealData);
                            }

                            if (['fragmentshown', 'fragmenthidden'].includes(revealData.eventName)) {
                                addFragmentToIndexedArray(revealData);
                            }
                            return;
                        }

                        // --- Navigation Sync ---
                        if (revealData.state) {
                            const newState = JSON.stringify(revealData.state);
                            if (newState !== slideState) {
                                slideState = newState;
                                let stateString = `${revealData.state.indexh},${revealData.state.indexv}`;
                                if (revealData.state.indexf !== undefined && revealData.state.indexf > -1) {
                                    stateString += `,${revealData.state.indexf}`;
                                }
                                
                                if (window.table) {
                                    let rows = window.table.searchRows("slideState", "=", stateString);
                                    if (rows.length > 0) {
                                        const targetRow = rows[0];
                                        window.table.deselectRow();
                                        window.table.selectRow(targetRow);
                                        selectedRowNumber = targetRow.getPosition();
                                        window.table.scrollToRow(targetRow, "center", false);
                                        
                                        // Process OBS tags for this slide if we haven't already
                                        await processTags(targetRow.getData());
                                    }
                                }
                            }
                        }

                        if (['overviewhidden', 'overviewshown'].includes(revealData.eventName)) {
                            await processTags({ overview: revealData.state.overview });
                        }
                    }
                } catch (err) {
                    console.error("[Studio] Error processing custom SSE message:", err);
                }
            });

            // messages from parent window (Still needed for legacy postMessage triggers if any)
            window.addEventListener("message", async (event) => {
                if (event.origin !== window.location.origin) return;
                
                let data;
                try {
                    data = JSON.parse(event.data);
                } catch (e) { return; }
                
                // Handle deck ID assignment from parent (direct UI interaction fallback)
                if (data.namespace === "speakerview" && data.message === "set-deck-id") {
                    console.log("[Studio] Assigned deck ID via postMessage:", data.deckId);
                    window.slideDeckId = data.deckId;
                    document.getElementById("slideDeckId").value = window.slideDeckId;
                    if (!slidesLoaded && localStorage.getItem(window.slideDeckId)) {
                        loadSavedTable();
                    }
                }
            });

            function addSlideToIndexedArray(data) {
                const attrs = data.attributes || {};
                const state = `${data.state.indexh},${data.state.indexv}`;
                
                window.slidesArray.push({
                    slideId: attrs.slideId,
                    slideState: state,
                    slideName: attrs.slideName,
                    slidePosition: attrs.slidePosition,
                    cameraPosition: attrs.cameraPosition,
                    cameraShape: attrs.cameraShape,
                    scene: attrs.scene
                });
                
                triggerIframeMethod('getProgress');
            }

            function addFragmentToIndexedArray(data) {
                const state = `${data.state.indexh},${data.state.indexv}`;
                const foundSlide = window.slidesArray.find(s => s.slideState === state);
                if (foundSlide) {
                    if (!foundSlide._children) foundSlide._children = [];
                    
                    const attrs = data.attributes || {};
                    foundSlide._children.push({
                        slideState: `${state},${data.state.indexf}`,
                        slideName: attrs.fragmentName || attrs.slideName,
                        slidePosition: attrs.fragmentPosition || attrs.slidePosition,
                        cameraPosition: attrs.fragmentCameraPosition || attrs.cameraPosition,
                        cameraShape: attrs.fragmentCameraShape || attrs.cameraShape,
                        scene: attrs.fragmentScene || attrs.scene
                    });
                }
                triggerIframeMethod('getProgress');
            }
        </script>
</body>
</html>
