<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Shape Mask</title>
    <link rel="stylesheet" href="../css/camera-shapes.css">
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .none {
            position: absolute;
            left: 0%;
            top: 0%;
            transform: translateX(0%) translateY(0%);
            border-radius: 0%;
            width: 100%;
            height: 100%;
            background-color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <div id="container" class="none"></div>
    
    <script type="module" src="../lib/sc-connection.js"></script>
    
    <script type="module">
        const container = document.getElementById("container");

        function applyShape(shape) {
            const finalShape = (shape && shape !== "none" && shape.trim() !== "") ? shape : "none";
            container.className = finalShape;
        }

        // Handle BroadcastChannel (Local Sync)
        const bc = new BroadcastChannel("cameraShapes_channel");
        bc.onmessage = (event) => {
            applyShape(event.data);
        };

        window.addEventListener('DOMContentLoaded', async(event) => {
            while (!window.scSocket) {
                await new Promise(r => setTimeout(r, 100));
            }

            // Connection listener loop
            (async () => {
                for await (let event of window.scSocket.listener('connect')) {
                    // Connected
                }
            })();

            // Disconnection listener loop
            (async () => {
                for await (let event of window.scSocket.listener('disconnect')) {
                    // Disconnected
                }
            })();

            // Subscribe to the broadcast navigation channels (both new and legacy)
            const channels = ['slides/navigation', 'slides_navigation'];
            
            channels.forEach(chanName => {
                (async () => {
                    const channel = window.scSocket.subscribe(chanName);
                    for await (let data of channel) {
                        try {
                            const payload = data.msgParam || {};
                            const shape = payload.cameraShape || (payload.attributes ? payload.attributes.cameraShape : null);
                            
                            if (shape !== null && shape !== undefined) {
                                applyShape(shape);
                            }
                        } catch (err) {
                            console.error("[CameraShape] Error parsing SC message:", err);
                        }
                    }
                })();
            });
        })
    </script>
</body>
</html>
