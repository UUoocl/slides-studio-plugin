<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Shape Mask</title>
    <link rel="stylesheet" href="../css/camera-shapes.css">
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .none {
            position: absolute;
            left: 0%;
            top: 0%;
            transform: translateX(0%) translateY(0%);
            border-radius: 0%;
            width: 100%;
            height: 100%;
            background-color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <div id="container" class="none"></div>
    
    <script type="module" src="../lib/slides-studio-connection.js"></script>
    
    <script type="module">
        function applyShape(config) {
            const container = document.getElementById("container");
            const shape = typeof config === 'string' ? config : (config ? config.path : null);
            const style = config && typeof config === 'object' ? config.style : null;

            if (!shape || shape === "none" || shape.trim() === "") {
                container.className = "none";
                container.style.clipPath = "";
                container.style.backgroundColor = "rgb(255, 255, 255)";
            } else if (shape.includes("(") || shape.includes(",")) {
                container.className = "";
                if (!shape.startsWith("path(") && !shape.startsWith("polygon(") && !shape.startsWith("circle(")) {
                    container.style.clipPath = `path("${shape}")`;
                } else {
                    container.style.clipPath = shape;
                }
                container.style.backgroundColor = "rgb(255, 255, 255)";
            } else {
                container.className = shape;
                container.style.clipPath = "";
            }

            // Apply arbitrary CSS styles (filters, borders, etc.)
            if (style && typeof style === 'object') {
                Object.assign(container.style, style);
            }
        }

        // Handle BroadcastChannel (Local Sync)
        const bc = new BroadcastChannel("cameraShapes_channel");
        bc.onmessage = (event) => {
            applyShape(event.data);
        };

        window.addEventListener('DOMContentLoaded', async(event) => {
            while (!window.ssSocket) {
                await new Promise(r => setTimeout(r, 100));
            }

            // Connection listener loops (keep for status if needed, or remove)
            (async () => {
                for await (let event of window.ssSocket.listener('connect')) {
                    console.log("[CameraShape] Socket connected.");
                }
            })();
        })
    </script>
</body>
</html>
