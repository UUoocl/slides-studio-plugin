<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Shape Mask</title>
    <link rel="stylesheet" href="../css/camera-shapes.css">
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .none {
            position: absolute;
            left: 0%;
            top: 0%;
            transform: translateX(0%) translateY(0%);
            border-radius: 0%;
            width: 100%;
            height: 100%;
            background-color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <div id="debug-status" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; font-family: monospace; font-size: 12px; z-index: 1000; border-radius: 4px; display: none;"></div>
    <div id="container" class="none"></div>
    <script>
        function showDebug(text, duration, color = "rgba(0,0,0,0.7)") {
            const debugEl = document.getElementById("debug-status");
            if (!debugEl) return;
            debugEl.innerText = text;
            debugEl.style.background = color;
            debugEl.style.display = "block";
            if (duration) setTimeout(() => { debugEl.style.display = "none"; }, duration);
        }

        window.addEventListener('DOMContentLoaded', async(event) => {
            console.log("[CameraShape] Initializing SSE connection...");
            // Unified SSE listener for all plugin events (slides, commands, etc.)
            const customSse = new EventSource('/api/events');
            
            customSse.onopen = () => {
                console.log("[CameraShape] SSE connection opened.");
                showDebug("SSE Connected", 3000, "green");
            };

            customSse.addEventListener('slidesCommands', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.msgParam && data.msgParam.cameraShape) {
                        const shape = data.msgParam.cameraShape;
                        console.debug("[CameraShape] Applying shape:", shape);
                        showDebug(`Shape: ${shape}`, 2000);
                        document.getElementById("container").className = shape;
                    }
                } catch (err) {
                    console.error("[CameraShape] Error parsing message:", err);
                }
            });

            customSse.onerror = (e) => {
                console.error("[CameraShape] SSE connection error", e);
                showDebug("SSE Error", 0, "red");
            };
        })
    </script>
</body>
</html>
