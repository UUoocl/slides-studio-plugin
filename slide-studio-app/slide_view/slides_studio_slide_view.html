<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slides Studio (OBS View)</title>
    <link rel="stylesheet" href="../css/iframe_positioins.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
    <script>
        // Define helpers in global scope
        window.showDebug = function(text, duration, color = "rgba(0,0,0,0.7)") {
            const debugEl = document.getElementById("debug-status");
            if (!debugEl) return;
            debugEl.innerText = text;
            debugEl.style.background = color;
            debugEl.style.display = "block";
            if (duration) setTimeout(() => { debugEl.style.display = "none"; }, duration);
        }

        window.onIframeLoad = function() {
            const iframe = document.getElementById("revealIframe");
            if (!iframe) return;
            const url = iframe.src;
            if (url && url !== "about:blank" && !url.includes("slides_studio_slide_view.html")) {
                console.log("[SlideView] Deck loaded:", url);
                showDebug(`Loaded: ${new URL(url).pathname}`, 3000, "green");
            }
        }

        window.onIframeError = function() {
            console.error("[SlideView] Iframe failed to load!");
            showDebug("Iframe Load ERROR", 5000, "red");
        }
    </script>
</head>
<body>
    <div id="debug-status" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; font-family: monospace; font-size: 12px; z-index: 1000; border-radius: 4px; display: none;"></div>
    <div class="container">
        <iframe id="revealIframe" class="slide-position full-screen" src="about:blank" onload="onIframeLoad()" onerror="onIframeError()" allow="autoplay; fullscreen"></iframe>
    </div>
    
    <!-- SocketCluster Scripts -->
    <script src="../lib/socketcluster-client.min.js"></script>
    <script src="../lib/sc-connection.js"></script>
    <script src="../lib/slideSync_OBS.js"></script>

    <script>
        console.log("[SlideView] SocketCluster View initialized.");
        const broadcastChannels = {}; 

        (async () => {
            while (!window.scSocket) {
                await new Promise(r => setTimeout(r, 100));
            }

            window.scSocket.on('connect', () => {
                showDebug("SC Connected", 3000, "green");
            });

            window.scSocket.on('disconnect', () => {
                showDebug("SC Disconnected", 0, "orange");
            });

            const channel = window.scSocket.subscribe('custom_slidesCommands');
            for await (let data of channel) {
                try {
                    const { eventName, msgParam } = data;
                    console.log("[SlideView] Received:", eventName, msgParam);
                    showDebug(`CMD: ${eventName}`, 2000);
                    
                    // CSS Updates
                    let slidePosClass = msgParam ? msgParam.slidePosition : null;
                    if (!slidePosClass && msgParam && msgParam.scene) {
                        const sceneName = msgParam.scene;
                        if (sceneName.includes("slides ")) {
                            slidePosClass = sceneName.split("slides ")[1];
                        }
                    }
                    if (slidePosClass) setSlidePositionCSS(slidePosClass);

                    // Camera Shape
                    if (msgParam && msgParam.cameraShape && broadcastChannels.cameraShapes) {
                        broadcastChannels.cameraShapes.postMessage(msgParam.cameraShape);
                    }
        
                    // Dispatch for slideSync_OBS.js internal listeners (if any still use CustomEvents)
                    window.dispatchEvent(new CustomEvent(eventName, { 
                        detail: { webSocketMessage: JSON.stringify(msgParam) } 
                    }));
                } catch (err) {
                    console.error("[SlideView] Error processing SC message:", err);
                }
            }
        })();

        window.addEventListener('DOMContentLoaded', () => {
            broadcastChannels.cameraShapes = new BroadcastChannel("cameraShapes_channel");
        });
        
        function setSlidePositionCSS(className) {
            const iframe = document.getElementById("revealIframe");
            if (iframe) {
                iframe.className = "slide-position " + className;
            }
        }
    </script>
</body>
</html>
