<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slides Studio (OBS View)</title>
    <link rel="stylesheet" href="../css/iframe_positions.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
    <script>
        window.onIframeLoad = function() {
            const iframe = document.getElementById("revealIframe");
            if (!iframe) return;
            const url = iframe.src;
            if (url && url !== "about:blank" && !url.includes("slides_studio_slide_view.html")) {
                // Deck loaded
            }
        }

        window.onIframeError = function() {
            console.error("[SlideView] Iframe failed to load!");
        }
    </script>
</head>
<body>
    <div class="container">
        <iframe id="revealIframe" class="slide-position full-screen" src="about:blank" onload="onIframeLoad()" onerror="onIframeError()" allow="autoplay; fullscreen"></iframe>
    </div>
    
    <!-- SocketCluster & Sync Scripts -->
    <script type="module" src="../lib/sc-connection.js"></script>
    <script type="module" src="../lib/slideSync_OBS.js"></script>

    <script type="module">
        // All synchronization is now handled within slideSync_OBS.js via SyncService.
        // This includes slide navigation, URL changes, and CSS layout transitions.
        
        (async () => {
            while (!window.scSocket) {
                await new Promise(r => setTimeout(r, 100));
            }

            // Optional: Listen for connection status if needed for UI feedback
            (async () => {
                for await (let event of window.scSocket.listener('connect')) {
                    console.log("[SlideView] SocketCluster connected");
                }
            })();
        })();
    </script>
</body>
</html>
