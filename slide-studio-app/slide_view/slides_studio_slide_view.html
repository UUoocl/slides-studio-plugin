<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slides Studio 127.0.0.1</title>
    <link rel="stylesheet" href="../css/iframe_positioins.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
    <script>
        // Define helpers in global scope for use by dynamically created iframes
        window.showDebug = function(text, duration, color = "rgba(0,0,0,0.7)") {
            const debugEl = document.getElementById("debug-status");
            if (!debugEl) return;
            debugEl.innerText = text;
            debugEl.style.background = color;
            debugEl.style.display = "block";
            if (duration) setTimeout(() => { debugEl.style.display = "none"; }, duration);
        }

        window.onIframeLoad = function() {
            const iframe = document.getElementById("revealIframe");
            if (!iframe) return;
            
            const url = iframe.src;
            console.log("[SlideView] Iframe triggered onload. Current src:", url);
            
            // Log computed size to detect "invisible" loads
            const rect = iframe.getBoundingClientRect();
            console.log(`[SlideView] Iframe dimensions: ${rect.width}x${rect.height}. Visibility: ${getComputedStyle(iframe).visibility}`);

            if (url && url !== "about:blank" && !url.includes("slides_studio_slide_view.html")) {
                console.log("[SlideView] Deck loaded successfully:", url);
                showDebug(`Loaded: ${new URL(url).pathname}`, 3000, "green");
            } else if (url.includes("slides_studio_slide_view.html")) {
                console.warn("[SlideView] Recursive load detected and blocked!");
                iframe.src = "about:blank";
            }
        }

        window.onIframeError = function() {
            console.error("[SlideView] Iframe failed to load!");
            showDebug("Iframe Load ERROR", 5000, "red");
        }
    </script>
</head>
<body>
    <div id="debug-status" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; font-family: monospace; font-size: 12px; z-index: 1000; border-radius: 4px; display: none;"></div>
    <div class="container">
        <iframe id="revealIframe" class="slide-position full-screen" src="about:blank" onload="onIframeLoad()" onerror="onIframeError()" allow="autoplay; fullscreen"></iframe>
    </div>
    
    <script src="../lib/slideSync_OBS.js"></script>
    <script>
        console.log("[SlideView] Script initialized. URL:", window.location.href);
        
        const broadcastChannels = {}; 

        // Unified SSE listener for all plugin events (slides, commands, etc.)
        console.log("[SlideView] Initializing unified SSE connection...");
        const customSse = new EventSource('/api/events');
        
        customSse.onopen = () => {
            console.log("[SlideView] SSE connection for custom events opened successfully.");
            showDebug("SSE Connected", 3000);
        };

        customSse.onerror = (e) => {
            console.error("[SlideView] SSE connection error for custom events:", e);
            showDebug("SSE Error!", 0, "red");
        };

        customSse.addEventListener('slidesCommands', (e) => {
            try {
                const data = JSON.parse(e.data);
                console.log("[SlideView] Received slidesCommand via SSE:", data);
                
                showDebug(`Received: ${data.eventName}`, 2000);
                
                // Handle local CSS updates (explicit slidePosition tag)
                let slidePosClass = data.msgParam ? data.msgParam.slidePosition : null;
                
                // Fallback: derive CSS class from OBS Scene name if slidePosition is missing
                if (!slidePosClass && data.msgParam && data.msgParam.scene) {
                    const sceneName = data.msgParam.scene;
                    if (sceneName.includes("slides ")) {
                        slidePosClass = sceneName.split("slides ")[1];
                        console.log(`[SlideView] Derived slide position from scene name: ${slidePosClass}`);
                    }
                }

                if (slidePosClass) {
                    console.log(`[SlideView] Applying slide position CSS: ${slidePosClass}`);
                    setSlidePositionCSS(slidePosClass);
                }
    
                // Handle Camera Shape broadcast
                if (data.msgParam && data.msgParam.cameraShape) {
                    console.log(`[SlideView] Broadcasting camera shape: ${data.msgParam.cameraShape}`);
                    broadcastChannels.cameraShapes.postMessage(data.msgParam.cameraShape);
                }
    
                console.log(`[SlideView] Dispatching local event: ${data.eventName}`);
                window.dispatchEvent(new CustomEvent(data.eventName, { 
                    detail: { 
                        webSocketMessage: JSON.stringify(data.msgParam) 
                    } 
                }));
            } catch (err) {
                console.error("[SlideView] Error processing SSE message:", err, e.data);
            }
        });

        window.addEventListener('DOMContentLoaded', async(event) => {
            broadcastChannels.cameraShapes = new BroadcastChannel("cameraShapes_channel");
        });
        
        async function setSlidePositionCSS(className) {
            const iframe = document.getElementById("revealIframe");
            if (iframe) {
                // IMPORTANT: Always keep the base class for core positioning logic
                iframe.className = "slide-position " + className;
            }
        }
    </script>
</body>
</html>
