<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKAI Fire MIDI Controller Demo</title>
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --accent-color: #ff5252; /* Fire Red */
      --pad-bg: #1a1a1a;
      --pad-active: #333;
      --knob-bg: #222;
      --button-bg: #2a2a2a;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      color: var(--accent-color);
      margin-bottom: 20px;
    }

    .status {
      margin-bottom: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #ff5252;
    }

    .status-indicator.connected {
      background-color: #00e676;
    }

    .container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #virtual-fire {
      background: #111;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      border: 2px solid #222;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 300px;
    }

    .control-group {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    button {
      background-color: #333;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      font-weight: bold;
    }

    button:hover {
      background-color: #444;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      background: #222;
      border: 1px solid #444;
      color: white;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>AKAI Fire Demo</h1>

  <div class="status">
    <div id="status-indicator" class="status-indicator"></div>
    <span id="status-text">Disconnected</span>
  </div>

  <div class="container">
    <div id="virtual-fire">
      <!-- Device UI will be implemented in next task -->
      <div id="oled-display" style="width: 128px; height: 64px; background: #000; border: 2px solid #333; margin-bottom: 20px;"></div>
      <div id="pad-matrix"></div>
    </div>

    <div class="controls">
      <div class="control-group">
        <h3>System</h3>
        <label for="comm-mode">Communication Mode:</label>
        <select id="comm-mode">
          <option value="direct">Direct WebMIDI</option>
          <option value="socket">SocketCluster Bridge</option>
        </select>
        <button id="btn-connect">Connect</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
