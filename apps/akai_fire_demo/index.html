<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKAI Fire MIDI Controller Demo</title>
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --accent-color: #ff5252; /* Fire Red */
      --pad-bg: #1a1a1a;
      --pad-active: #333;
      --knob-bg: #222;
      --button-bg: #2a2a2a;
      --oled-bg: #000;
      --oled-text: #00ff00; /* Green monochrome display */
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      color: var(--accent-color);
      margin-bottom: 20px;
    }

    .status {
      margin-bottom: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #ff5252;
    }

    .status-indicator.connected {
      background-color: #00e676;
    }

    .container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #virtual-fire {
      background: #111;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
      border: 2px solid #222;
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: fit-content;
      max-width: 95vw;
    }

    /* OLED & Knobs Section */
    .top-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      gap: 40px;
      flex-wrap: wrap;
    }

    #oled-display {
      width: 128px;
      height: 64px;
      background: var(--oled-bg);
      border: 3px solid #333;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      color: var(--oled-text);
      font-size: 14px;
      text-transform: uppercase;
      box-shadow: inset 0 0 10px rgba(0,255,0,0.2), 0 0 5px rgba(0,255,0,0.1);
      overflow: hidden;
      white-space: nowrap;
    }

    .knobs-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .knob-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .knob {
      width: 45px;
      height: 45px;
      background: linear-gradient(145deg, #222, #111);
      border-radius: 50%;
      border: 2px solid #444;
      position: relative;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      transition: transform 0.1s linear;
    }

    .knob::after {
      content: '';
      position: absolute;
      width: 3px;
      height: 12px;
      background: #ff5252;
      left: 50%;
      transform: translateX(-50%);
      top: 4px;
      border-radius: 2px;
    }

    .knob-label {
      font-size: 9px;
      color: #888;
      font-weight: bold;
    }

    /* Pad Matrix Section */
    .matrix-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .pad {
      width: 38px;
      height: 32px;
      background: var(--pad-bg);
      border-radius: 4px;
      border: 1px solid #000;
      cursor: pointer;
      transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.05);
    }

    .pad:hover {
      background: #222;
    }

    .pad.active {
      transform: scale(0.95);
    }

    /* Side Buttons */
    .side-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-fire {
      width: 55px;
      height: 32px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 9px;
      font-weight: bold;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      text-align: center;
      padding: 2px;
    }

    .btn-fire:hover {
      background: #333;
      color: #ccc;
    }

    .main-grid-container {
      display: flex;
      gap: 15px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 300px;
    }

    .control-group {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    button {
      background-color: #333;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      font-weight: bold;
    }

    button:hover {
      background-color: #444;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      background: #222;
      border: 1px solid #444;
      color: white;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>AKAI Fire Demo</h1>

  <div class="status">
    <div id="status-indicator" class="status-indicator"></div>
    <span id="status-text">Disconnected</span>
  </div>

  <div class="container">
    <div id="virtual-fire">
      
      <div class="top-panel">
        <div id="oled-display">AKAI FIRE</div>
        <div class="knobs-container">
          <div class="knob-unit"><div class="knob" id="knob-vol"></div><div class="knob-label">VOLUME</div></div>
          <div class="knob-unit"><div class="knob" id="knob-pan"></div><div class="knob-label">PAN</div></div>
          <div class="knob-unit"><div class="knob" id="knob-filter"></div><div class="knob-label">FILTER</div></div>
          <div class="knob-unit"><div class="knob" id="knob-res"></div><div class="knob-label">RESONANCE</div></div>
          <div class="knob-unit"><div class="knob" id="knob-select"></div><div class="knob-label">SELECT</div></div>
        </div>
      </div>

      <div class="main-grid-container">
        <div class="side-buttons">
          <div class="btn-fire" id="btn-solo-1">SOLO 1</div>
          <div class="btn-fire" id="btn-solo-2">SOLO 2</div>
          <div class="btn-fire" id="btn-solo-3">SOLO 3</div>
          <div class="btn-fire" id="btn-solo-4">SOLO 4</div>
        </div>

        <div id="pad-matrix">
          <!-- Will be populated via JS -->
        </div>
      </div>

    </div>

    <div class="controls">
      <div class="control-group">
        <h3>System</h3>
        <label for="comm-mode">Communication Mode:</label>
        <select id="comm-mode">
          <option value="direct">Direct WebMIDI</option>
          <option value="socket">SocketCluster Bridge</option>
        </select>

        <div id="midi-select-container">
          <label for="midi-device">MIDI Device (WebMIDI):</label>
          <select id="midi-device">
            <option value="">(Scan for devices...)</option>
          </select>
        </div>

        <div id="sc-select-container" style="display: none;">
          <label for="sc-device-name">Plugin MIDI Alias:</label>
          <input type="text" id="sc-device-name" placeholder="e.g. Fire1" style="width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px;">
          <select id="sc-device-list" style="margin-top: 5px;">
            <option value="">(Waiting for plugin...)</option>
          </select>
        </div>

        <button id="btn-connect">Connect</button>
      </div>

      <div class="control-group">
        <h3>Demo Controls</h3>
        <label for="app-mode">Mode:</label>
        <select id="app-mode">
          <option value="paint">Paint Mode</option>
          <option value="sequencer">Sequencer Demo</option>
        </select>
        
        <div id="paint-controls">
          <label>Selected Color:</label>
          <div style="display: flex; gap: 5px; margin-top: 5px;">
            <div class="color-swatch" data-r="127" data-g="0" data-b="0" style="background: #ff0000; width: 25px; height: 25px; cursor: pointer; border: 2px solid #fff;"></div>
            <div class="color-swatch" data-r="0" data-g="127" data-b="0" style="background: #00ff00; width: 25px; height: 25px; cursor: pointer; border: 1px solid #444;"></div>
            <div class="color-swatch" data-r="0" data-g="0" data-b="127" style="background: #0000ff; width: 25px; height: 25px; cursor: pointer; border: 1px solid #444;"></div>
            <div class="color-swatch" data-r="127" data-g="127" data-b="0" style="background: #ffff00; width: 25px; height: 25px; cursor: pointer; border: 1px solid #444;"></div>
            <div class="color-swatch" data-r="0" data-g="0" data-b="0" style="background: #000000; width: 25px; height: 25px; cursor: pointer; border: 1px solid #444;"></div>
          </div>
        </div>
      </div>

      <div class="control-group">
        <h3>OLED Display</h3>
        <label for="oled-text-input">Display Text:</label>
        <input type="text" id="oled-text-input" placeholder="Enter text..." maxlength="20" style="width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px;">
        <button id="btn-send-oled">Send to OLED</button>
      </div>
    </div>
  </div>

  <script src="../lib/socketcluster-client.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
