<!DOCTYPE html>
<html>
<head>
    <title>Mouse Monitor Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: transparent;
            font-family: sans-serif;
        }
        #cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 0, 0, 0.5);
            border: 2px solid red;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: width 0.1s, height 0.1s, background-color 0.1s;
            z-index: 1000;
        }
        #cursor.clicked {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 0, 0.8);
        }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        .scroll-indicator {
            position: absolute;
            width: 4px;
            background-color: cyan;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="info">
        Mouse Monitor Active<br>
        SSE Topics: mousePosition, mouseClick, mouseScroll
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const info = document.getElementById('info');
        
        // Connect to named SSE endpoints
        const posSource = new EventSource('/api/mouse/events/mousePosition');
        const clickSource = new EventSource('/api/mouse/events/mouseClick');
        const scrollSource = new EventSource('/api/mouse/events/mouseScroll');

        posSource.addEventListener('mousePosition', (event) => {
            const data = JSON.parse(event.data);
            const { x, y } = data;
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
            updateInfo(`Pos: ${x}, ${y}`);
        });

        clickSource.addEventListener('mouseClick', (event) => {
            const data = JSON.parse(event.data);
            const { button, pressed } = data;
            if (pressed) {
                cursor.classList.add('clicked');
                setTimeout(() => cursor.classList.remove('clicked'), 200);
            }
            updateInfo(`Click: ${button} ${pressed ? 'Down' : 'Up'}`);
        });

        scrollSource.addEventListener('mouseScroll', (event) => {
            const data = JSON.parse(event.data);
            const { dx, dy } = data;
            showScroll(dx, dy);
            updateInfo(`Scroll: ${dx}, ${dy}`);
        });

        function updateInfo(text) {
            info.innerHTML = `Mouse Monitor Active<br>${text}`;
        }

        function showScroll(dx, dy) {
            const indicator = document.createElement('div');
            indicator.className = 'scroll-indicator';
            indicator.style.left = cursor.style.left;
            indicator.style.top = cursor.style.top;
            indicator.style.height = Math.abs(dy * 10) + 'px';
            indicator.style.opacity = 1;
            if (dy > 0) indicator.style.transform = 'translateY(-100%)';
            document.body.appendChild(indicator);
            
            setTimeout(() => {
                indicator.style.opacity = 0;
                setTimeout(() => indicator.remove(), 500);
            }, 100);
        }

        // Handle window state saving
        if (window.electronAPI) {
            window.electronAPI.onGetState(() => {
                return {}; // No specific state needed for this demo
            });
            window.electronAPI.onRestoreState((state) => {
                // Restore logic if needed
            });
        }
    </script>
</body>
</html>
