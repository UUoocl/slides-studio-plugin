<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launchpad mk3 LED Controller Demo</title>
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --accent-color: #00e676;
      --pad-bg: #333;
      --pad-active: #555;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      color: var(--accent-color);
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 300px;
    }

    .control-group {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .control-group h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.1em;
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
    }

    button {
      background-color: #333;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
      width: 100%;
      margin-bottom: 10px;
      font-weight: bold;
    }

    button:hover {
      background-color: #444;
    }

    button.active {
      background-color: var(--accent-color);
      color: black;
    }

    input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      background: #222;
      border: 1px solid #444;
      color: white;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .status {
      margin-bottom: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #ff5252; /* Red initially */
    }

    .status-indicator.connected {
      background-color: #00e676; /* Green */
    }

    #virtual-launchpad {
      display: grid;
      grid-template-columns: repeat(9, 50px);
      grid-template-rows: repeat(9, 50px);
      gap: 5px;
      background: #000;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .pad {
      width: 50px;
      height: 50px;
      background-color: var(--pad-bg);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #666;
      cursor: pointer;
      transition: all 0.1s;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-sizing: border-box;
    }

    .pad:hover {
      background-color: var(--pad-active);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .pad.active-glow {
      border-color: rgba(255, 255, 255, 0.5);
      color: rgba(255, 255, 255, 0.8);
    }

    .pad.round {
      border-radius: 50%;
    }

    .pad.top-row {
      background-color: #222;
    }

    .pad.right-col {
      background-color: #222;
    }

    .pad.logo {
      background: transparent;
      color: var(--accent-color);
      font-weight: bold;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Launchpad mk3 Demo</h1>

  <div class="status">
    <div id="status-indicator" class="status-indicator"></div>
    <span id="status-text">Disconnected</span>
  </div>

  <div class="container">
    <div id="virtual-launchpad">
      <!-- Grid will be generated via JavaScript -->
    </div>

    <div class="controls">
      <div class="control-group">
        <h3>Connectivity</h3>
        <label for="comm-mode">Mode:</label>
        <select id="comm-mode">
          <option value="direct">Direct WebMIDI</option>
          <option value="socket" selected>SocketCluster Bridge</option>
        </select>
        
        <div id="sc-select-container">
          <label for="device-name">Plugin MIDI Alias:</label>
          <input type="text" id="device-name" value="Launchpad MK3">
        </div>

        <div id="midi-select-container" style="display: none;">
          <label for="midi-input-select">Local MIDI Input:</label>
          <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <select id="midi-input-select" style="flex-grow: 1; margin-bottom: 0;">
              <option value="">Scan for inputs...</option>
            </select>
          </div>

          <label for="midi-output-select">Local MIDI Output:</label>
          <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <select id="midi-output-select" style="flex-grow: 1; margin-bottom: 0;">
              <option value="">Scan for outputs...</option>
            </select>
          </div>
          
          <button id="btn-scan" style="width: auto; padding: 5px 10px;">Rescan Devices</button>
        </div>

        <button id="btn-connect" style="margin-top: 10px;">Connect</button>
      </div>

      <div class="control-group">
        <h3>LED Control</h3>
        <label for="palette-color">Color Index (0-127):</label>
        <input type="number" id="palette-color" value="5" min="0" max="127">
        
        <label for="led-behavior">Behavior:</label>
        <select id="led-behavior">
          <option value="90">Solid (10%)</option>
          <option value="96" selected>Solid (100%)</option>
          <option value="97">Pulsing (1/16)</option>
          <option value="9A">Pulsing (1/2)</option>
          <option value="9B">Blinking (1/24)</option>
          <option value="9F">Blinking (1/2)</option>
        </select>
        
        <div class="custom-rgb-section" style="margin-top: 20px; border-top: 1px solid #444; padding-top: 15px;">
          <label><input type="checkbox" id="use-custom-rgb" style="width: auto; margin-bottom: 0;"> Use Custom 24-bit RGB (SysEx)</label>
          <div id="custom-rgb-controls" style="margin-top: 10px; opacity: 0.5; pointer-events: none;">
            <label>Red: <span id="val-r">255</span></label>
            <input type="range" id="rgb-r" min="0" max="255" value="255">
            <label>Green: <span id="val-g">0</span></label>
            <input type="range" id="rgb-g" min="0" max="255" value="0">
            <label>Blue: <span id="val-b">0</span></label>
            <input type="range" id="rgb-b" min="0" max="255" value="0">
          </div>
        </div>
      </div>

      <div class="control-group">
        <h3>System</h3>
        <button id="btn-programmer">Enter Programmer Mode</button>
        <button id="btn-clear">Clear All LEDs</button>
      </div>

      <div class="control-group">
        <h3>Solid Fill</h3>
        <label for="fill-color">Color Index (0-127):</label>
        <input type="number" id="fill-color" value="45" min="0" max="127">
        <button id="btn-fill">Apply Solid Fill</button>
      </div>

      <div class="control-group">
        <h3>Dynamic Patterns</h3>
        <button id="btn-rainbow">Rainbow Wave</button>
        <button id="btn-sparkle">Random Sparkle</button>
      </div>

      <div class="control-group">
        <h3>Scrolling Text</h3>
        <label for="scroll-text">Text:</label>
        <input type="text" id="scroll-text" placeholder="Hello Launchpad!">
        <label for="scroll-color">Color Index:</label>
        <input type="number" id="scroll-color" value="5" min="0" max="127">
        <button id="btn-scroll">Start Scrolling</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
