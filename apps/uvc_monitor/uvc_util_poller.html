<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVC PTZF Poller & Mapper (SocketCluster)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background-color: #252526;
            border-left: 5px solid #4ec9b0;
            border-radius: 3px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; font-size: 1.1em; color: #808080; text-transform: uppercase; letter-spacing: 1px; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 8px 12px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .status.connected { color: #4ec9b0; }
        .status.disconnected { color: #f44747; }

        .row { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mapping-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; align-items: center; }

        input, button {
            background-color: #3c3c3c;
            border: 1px solid #555;
            color: #fff;
            padding: 8px;
            border-radius: 2px;
            font-family: inherit;
        }

        button { background-color: #0e639c; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #1177bb; }
        button#stop-btn { background-color: #a31515; }
        button:disabled { background-color: #444; cursor: not-allowed; opacity: 0.5; }

        .value-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-family: 'Consolas', monospace;
            font-size: 0.95em;
        }
        .val-group { background: #1a1a1a; padding: 10px; border-radius: 3px; border: 1px solid #333; }
        .label { color: #808080; font-size: 0.85em; display: block; }
        .value { color: #ce9178; font-weight: bold; font-size: 1.1em; }
        .mapped-value { color: #4ec9b0; font-weight: bold; font-size: 1.1em; }

        .log-box {
            background-color: #000;
            font-family: 'Consolas', monospace;
            padding: 10px;
            height: 100px;
            overflow-y: auto;
            border: 1px solid #333;
            font-size: 0.8em;
            color: #6a9955;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>Device: <strong id="chan-display" style="color: #569cd6;">...</strong></span>
        <span>SocketCluster: <strong id="sc-status" class="status disconnected">Disconnected</strong></span>
        <span>Polling: <strong id="poll-status" style="color:#888;">Idle</strong></span>
    </div>

    <div class="card">
        <h2>Output Range Mapping</h2>
        <div class="mapping-grid">
            <span class="label">Parameter</span> <span class="label">Target Min</span> <span class="label">Target Max</span>
            
            <span>Pan</span> 
            <input type="number" id="user-pan-min" value="0"> 
            <input type="number" id="user-pan-max" value="100">
            
            <span>Tilt</span> 
            <input type="number" id="user-tilt-min" value="0"> 
            <input type="number" id="user-tilt-max" value="100">
            
            <span>Zoom</span> 
            <input type="number" id="user-zoom-min" value="0"> 
            <input type="number" id="user-zoom-max" value="100">
            
            <span>Focus</span> 
            <input type="number" id="user-focus-min" value="0"> 
            <input type="number" id="user-focus-max" value="100">
        </div>
    </div>

    <div class="card">
        <h2>Broadcast Settings</h2>
        <div class="grid">
            <div>
                <label class="label">Manual Interval (ms)</label>
                <input type="number" id="poll-interval" value="250" min="50" style="width: 100%;">
                <small style="color: #666;">Note: Plugin-level polling is preferred.</small>
            </div>
            <div>
                <label class="label">Local Broadcast Channel</label>
                <input type="text" id="bc-name" value="uvc-ptzf-mapped" style="width: 100%;">
            </div>
        </div>
        <div class="row" style="margin-top: 15px; margin-bottom: 0;">
            <button id="start-btn" style="flex: 1;">START BROADCAST</button>
            <button id="stop-btn" disabled style="flex: 1;">STOP</button>
        </div>
    </div>

    <div class="card">
        <h2>Live Monitor (Mapped)</h2>
        <div class="value-display">
            <div class="val-group"><span class="label">PAN</span><span id="mon-pan" class="mapped-value">--</span><br><small id="raw-pan" style="color:#555;">raw: --</small></div>
            <div class="val-group"><span class="label">TILT</span><span id="mon-tilt" class="mapped-value">--</span><br><small id="raw-tilt" style="color:#555;">raw: --</small></div>
            <div class="val-group"><span class="label">ZOOM</span><span id="mon-zoom" class="mapped-value">--</span><br><small id="raw-zoom" style="color:#555;">raw: --</small></div>
            <div class="val-group"><span class="label">FOCUS</span><span id="mon-focus" class="mapped-value">--</span><br><small id="raw-focus" style="color:#555;">raw: --</small></div>
        </div>
    </div>

    <div class="card">
        <h2>Broadcast Log</h2>
        <div id="log" class="log-box"></div>
    </div>

    <script type="module">
        import { create } from '../lib/socketcluster-client.min.js';

        const urlParams = new URLSearchParams(window.location.search);
        const deviceName = urlParams.get('name');
        
        if (!deviceName) {
            document.body.innerHTML = '<div style="color: #ff4444; padding: 20px; font-weight: bold;">Error: No "name" parameter provided.<br>Usage: ?name=camera_alias</div>';
            throw new Error("Missing name param");
        }

        const IN_CHAN = `uvc_in_${deviceName}`;
        const OUT_CHAN = `uvc_out_${deviceName}`;
        document.getElementById('chan-display').textContent = deviceName;

        let socket = null;
        let pollTimer = null;
        let bc = null;

        // Hardware Limits (fetched on connection)
        const hwLimits = {
            pan: { min: 0, max: 1 },
            tilt: { min: 0, max: 1 },
            zoom: { min: 0, max: 1 },
            focus: { min: 0, max: 1 }
        };

        const elements = {
            scStatus: document.getElementById('sc-status'),
            pollStatus: document.getElementById('poll-status'),
            startBtn: document.getElementById('start-btn'),
            stopBtn: document.getElementById('stop-btn'),
            log: document.getElementById('log'),
            mon: {
                pan: document.getElementById('mon-pan'), tilt: document.getElementById('mon-tilt'),
                zoom: document.getElementById('mon-zoom'), focus: document.getElementById('mon-focus'),
                rawPan: document.getElementById('raw-pan'), rawTilt: document.getElementById('raw-tilt'),
                rawZoom: document.getElementById('raw-zoom'), rawFocus: document.getElementById('raw-focus')
            }
        };

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            elements.log.insertBefore(entry, elements.log.firstChild);
            if (elements.log.children.length > 10) elements.log.removeChild(elements.log.lastChild);
        }

        async function initSocketCluster() {
            if (socket) socket.disconnect();

            socket = create({
                hostname: window.location.hostname,
                port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
                path: '/socketcluster/',
                authToken: { name: `UVC-Poller: ${deviceName}` }
            });
            
            (async () => {
                for await (let event of socket.listener('connect')) {
                    elements.scStatus.textContent = "Connected";
                    elements.scStatus.className = "status connected";
                    addLog("SocketCluster Connected");
                    
                    // Identify this client for the SC Monitor
                    try {
                        await socket.invoke('setInfo', { name: `UVC Poller (${deviceName})` });
                    } catch (e) {}

                    subscribeToInChannel();
                    // Fetch hardware ranges to ensure mapping is correct
                    sendCommand({ action: "get_controls" });
                }
            })();

            (async () => {
                for await (let event of socket.listener('disconnect')) {
                    elements.scStatus.textContent = "Disconnected";
                    elements.scStatus.className = "status disconnected";
                    addLog("SocketCluster Disconnected");
                    stopPolling();
                }
            })();

            (async () => {
                for await (let {error} of socket.listener('error')) {
                    console.error('Socket Error:', error);
                }
            })();
        }

        async function subscribeToInChannel() {
            const channel = socket.subscribe(IN_CHAN);
            for await (let msg of channel) {
                handleMessage(msg);
            }
        }

        async function sendCommand(data) {
            if (!socket || socket.state !== 'open') return;
            socket.transmitPublish(OUT_CHAN, data);
        }

        function handleMessage(msg) {
            if (msg.action === "get_controls" || msg.action === "poll") {
                updateHwLimits(msg.data);
                // If it's a poll message, process values
                if (msg.action === "poll") {
                    processPollData(msg.data);
                }
            } else if (msg.action === "get_value") {
                processIncomingValue(msg);
            }
        }

        function updateHwLimits(controls) {
            if (!Array.isArray(controls)) return;
            controls.forEach(c => {
                if (c.name === "pan-tilt-abs") {
                    hwLimits.pan.min = c.minimum.pan; hwLimits.pan.max = c.maximum.pan;
                    hwLimits.tilt.min = c.minimum.tilt; hwLimits.tilt.max = c.maximum.tilt;
                } else if (c.name === "zoom-abs") {
                    hwLimits.zoom.min = c.minimum; hwLimits.zoom.max = c.maximum;
                } else if (c.name === "focus-abs") {
                    hwLimits.focus.min = c.minimum; hwLimits.focus.max = c.maximum;
                }
            });
        }

        function processPollData(controls) {
            if (!Array.isArray(controls)) return;
            controls.forEach(c => {
                if (c.name === "pan-tilt-abs" || c.name === "zoom-abs" || c.name === "focus-abs") {
                    processIncomingValue({
                        action: "get_value",
                        control: c.name,
                        data: c["current-value"]
                    });
                }
            });
        }

        function lerp(val, inMin, inMax, outMin, outMax) {
            if (inMax === inMin) return outMin;
            const res = (val - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
            return parseFloat(res.toFixed(3));
        }

        function processIncomingValue(msg) {
            const data = msg.data;
            if (!data || msg.error) return;
            
            const payload = { timestamp: Date.now() };
            const uMin = (id) => parseFloat(document.getElementById(`user-${id}-min`).value);
            const uMax = (id) => parseFloat(document.getElementById(`user-${id}-max`).value);

            if (msg.control === "pan-tilt-abs") {
                payload.pan_raw = data.pan;
                payload.tilt_raw = data.tilt;
                payload.pan = lerp(data.pan, hwLimits.pan.min, hwLimits.pan.max, uMin('pan'), uMax('pan'));
                payload.tilt = lerp(data.tilt, hwLimits.tilt.min, hwLimits.tilt.max, uMin('tilt'), uMax('tilt'));
                
                elements.mon.pan.textContent = payload.pan; elements.mon.rawPan.textContent = `raw: ${payload.pan_raw}`;
                elements.mon.tilt.textContent = payload.tilt; elements.mon.rawTilt.textContent = `raw: ${payload.tilt_raw}`;
            } else if (msg.control === "zoom-abs") {
                payload.zoom_raw = data;
                payload.zoom = lerp(data, hwLimits.zoom.min, hwLimits.zoom.max, uMin('zoom'), uMax('zoom'));
                elements.mon.zoom.textContent = payload.zoom; elements.mon.rawZoom.textContent = `raw: ${payload.zoom_raw}`;
            } else if (msg.control === "focus-abs") {
                payload.focus_raw = data;
                payload.focus = lerp(data, hwLimits.focus.min, hwLimits.focus.max, uMin('focus'), uMax('focus'));
                elements.mon.focus.textContent = payload.focus; elements.mon.rawFocus.textContent = `raw: ${payload.focus_raw}`;
            }

            if (bc && (payload.pan !== undefined || payload.zoom !== undefined || payload.focus !== undefined)) {
                bc.postMessage(payload);
            }
        }

        function startPolling() {
            const interval = parseInt(document.getElementById('poll-interval').value) || 250;
            bc = new BroadcastChannel(document.getElementById('bc-name').value);
            
            elements.startBtn.disabled = true;
            elements.stopBtn.disabled = false;
            elements.pollStatus.textContent = "Active";
            elements.pollStatus.style.color = "#4ec9b0";
            
            addLog(`Broadcasting to channel '${bc.name}'...`);

            // Optional: Manual polling if bridge polling is disabled
            pollTimer = setInterval(() => {
                sendCommand({ action: "get_value", control: "pan-tilt-abs" });
                sendCommand({ action: "get_value", control: "zoom-abs" });
                sendCommand({ action: "get_value", control: "focus-abs" });
            }, interval);
        }

        function stopPolling() {
            if (pollTimer) clearInterval(pollTimer);
            if (bc) bc.close();
            pollTimer = null; bc = null;
            elements.startBtn.disabled = false;
            elements.stopBtn.disabled = true;
            elements.pollStatus.textContent = "Idle";
            elements.pollStatus.style.color = "#888";
            addLog("Broadcasting stopped.");
        }

        document.getElementById('start-btn').onclick = startPolling;
        document.getElementById('stop-btn').onclick = stopPolling;

        initSocketCluster();
    </script>
</body>
</html>
