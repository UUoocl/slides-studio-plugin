<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVC Controller (SocketCluster)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background-color: #252526;
            border-left: 5px solid #007acc;
            border-radius: 3px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; font-size: 1.1em; color: #808080; text-transform: uppercase; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .status.connected { color: #4ec9b0; }
        .status.disconnected { color: #f44747; }

        select, input, button {
            background-color: #3c3c3c;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 10px;
            border-radius: 2px;
            font-family: inherit;
        }
        button { background-color: #0e639c; cursor: pointer; border: none; }
        button:hover { background-color: #1177bb; }
        button:disabled { background-color: #444; cursor: not-allowed; }

        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        #controls-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 5px;
        }
        .control-item {
            background: #2d2d2d;
            padding: 8px;
            margin-bottom: 5px;
            font-size: 0.9em;
            display: grid;
            grid-template-columns: 1.5fr 80px 1fr;
            gap: 10px;
            align-items: center;
        }
        .control-name { font-weight: bold; color: #ce9178; }
        
        .log-box {
            background-color: #000;
            font-family: 'Consolas', monospace;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            border: 1px solid #333;
            font-size: 0.85em;
        }
        .log-entry { border-bottom: 1px solid #222; padding: 2px 0; }
        .log-time { color: #569cd6; margin-right: 5px; }
        .log-tx { color: #4ec9b0; }
        .log-rx { color: #ce9178; }
        .log-info { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>Channel: <strong id="chan-display" style="color: #569cd6;">...</strong></span>
        <span>SocketCluster: <strong id="sc-status" class="status disconnected">Disconnected</strong></span>
        <button id="reconnect-btn">Reconnect</button>
    </div>

    <div class="card">
        <h2>UVC Controls</h2>
        <div class="row">
            <button id="get-controls-btn">Refresh Controls</button>
            <input type="text" id="manual-control-name" placeholder="Control Name" style="flex-grow: 1;">
            <input type="text" id="manual-control-val" placeholder="Value" style="width: 100px;">
            <button id="manual-set-btn">Set</button>
        </div>
        <div id="controls-container">
            <div style="padding:10px; color:#888;">Connecting to camera channel...</div>
        </div>
    </div>

    <div class="card">
        <h2>Message Log</h2>
        <div id="log" class="log-box"></div>
    </div>

    <script type="module">
        import { create } from '../lib/socketcluster-client.min.js';

        const urlParams = new URLSearchParams(window.location.search);
        const deviceName = urlParams.get('name');
        
        if (!deviceName) {
            document.body.innerHTML = '<div style="color: #ff4444; padding: 20px; font-weight: bold;">Error: No "name" parameter provided.<br>Usage: ?name=camera_alias</div>';
            throw new Error("Missing name param");
        }

        const IN_CHAN = `uvc_in_${deviceName}`;
        const OUT_CHAN = `uvc_out_${deviceName}`;
        document.getElementById('chan-display').textContent = deviceName;

        let socket = null;
        const logBox = document.getElementById('log');
        const scStatus = document.getElementById('sc-status');
        const controlsContainer = document.getElementById('controls-container');

        function log(msg, type = 'rx') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.innerHTML = `<span class="log-time">${time}</span><span class="log-${type}">${msg}</span>`;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 50) logBox.removeChild(logBox.lastChild);
        }

        async function initSocketCluster() {
            if (socket) {
                socket.disconnect();
            }

            socket = create({
                hostname: window.location.hostname,
                port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
                path: '/socketcluster/'
            });
            
            (async () => {
                for await (let event of socket.listener('connect')) {
                    scStatus.textContent = "Connected";
                    scStatus.className = "status connected";
                    log(`Connected to channel: ${deviceName}`, "info");
                    subscribeToInChannel();
                    // Initial load of controls
                    setTimeout(() => sendCommand({ action: "get_controls" }), 500);
                }
            })();

            (async () => {
                for await (let event of socket.listener('disconnect')) {
                    scStatus.textContent = "Disconnected";
                    scStatus.className = "status disconnected";
                    log("SocketCluster Disconnected", "info");
                }
            })();

            (async () => {
                for await (let {error} of socket.listener('error')) {
                    console.error('Socket Error:', error);
                }
            })();
        }

        async function subscribeToInChannel() {
            const channel = socket.subscribe(IN_CHAN);
            for await (let msg of channel) {
                handleMessage(msg);
            }
        }

        async function sendCommand(data) {
            if (!socket || socket.state !== 'open') {
                log("Error: Socket not open", "tx");
                return;
            }
            log(`TX (${OUT_CHAN}): ${data.action}`, "tx");
            socket.transmitPublish(OUT_CHAN, data);
        }

        function handleMessage(msg) {
            // Only log if not a repeating poll message to keep log readable
            if (msg.action !== "poll") {
                log("RX: " + JSON.stringify(msg), "rx");
            }

            if (msg.action === "get_controls" || msg.action === "poll") {
                renderControls(msg.data);
            } else if (msg.action === "get_value") {
                log(`Value for ${msg.control}: ${JSON.stringify(msg.data)}`, "rx");
            }
        }

        function renderControls(controls) {
            if (!controls || !Array.isArray(controls)) return;
            
            // Optimization: Only redraw if count changes, otherwise just update values
            const existingRows = controlsContainer.querySelectorAll('.control-item');
            if (existingRows.length !== controls.length) {
                controlsContainer.innerHTML = '';
                controls.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'control-item';
                    div.id = `ctrl-${c.name}`;
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'control-name';
                    nameSpan.textContent = c.name;
                    
                    const readBtn = document.createElement('button');
                    readBtn.textContent = 'Read';
                    readBtn.onclick = () => sendCommand({ action: "get_value", control: c.name });
                    
                    const valSpan = document.createElement('span');
                    valSpan.className = 'control-val';
                    valSpan.style.fontSize = '0.8em';
                    valSpan.style.color = '#aaa';
                    valSpan.textContent = JSON.stringify(c["current-value"] || {});
                    
                    div.appendChild(nameSpan);
                    div.appendChild(readBtn);
                    div.appendChild(valSpan);
                    controlsContainer.appendChild(div);
                });
            } else {
                // Update values in-place
                controls.forEach(c => {
                    const row = document.getElementById(`ctrl-${c.name}`);
                    if (row) {
                        const valSpan = row.querySelector('.control-val');
                        if (valSpan) valSpan.textContent = JSON.stringify(c["current-value"] || {});
                    }
                });
            }
        }

        // Event Listeners
        document.getElementById('reconnect-btn').onclick = initSocketCluster;
        document.getElementById('get-controls-btn').onclick = () => sendCommand({ action: "get_controls" });

        document.getElementById('manual-set-btn').onclick = () => {
            const name = document.getElementById('manual-control-name').value;
            const val = document.getElementById('manual-control-val').value;
            if (name && val) {
                sendCommand({ action: "set_value", control: name, value: val });
            }
        };

        // Initial setup
        initSocketCluster();

    </script>
</body>
</html>
