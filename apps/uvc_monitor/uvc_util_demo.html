<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVC Controller (SocketCluster)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background-color: #252526;
            border-left: 5px solid #007acc;
            border-radius: 3px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; font-size: 1.1em; color: #808080; text-transform: uppercase; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .status.connected { color: #4ec9b0; }
        .status.disconnected { color: #f44747; }

        select, input, button {
            background-color: #3c3c3c;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 10px;
            border-radius: 2px;
            font-family: inherit;
        }
        button { background-color: #0e639c; cursor: pointer; border: none; }
        button:hover { background-color: #1177bb; }
        button:disabled { background-color: #444; cursor: not-allowed; }

        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        #controls-container {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 5px;
        }
        .control-item {
            background: #2d2d2d;
            padding: 5px;
            margin-bottom: 5px;
            font-size: 0.9em;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            align-items: center;
        }
        .control-name { font-weight: bold; color: #ce9178; }
        
        .log-box {
            background-color: #000;
            font-family: 'Consolas', monospace;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            font-size: 0.85em;
        }
        .log-entry { border-bottom: 1px solid #222; padding: 2px 0; }
        .log-time { color: #569cd6; margin-right: 5px; }
        .log-tx { color: #4ec9b0; }
        .log-rx { color: #ce9178; }
    </style>
</head>
<body>

    <div class="status-bar">
        <span>SocketCluster: <strong id="sc-status" class="status disconnected">Disconnected</strong></span>
        <button id="reconnect-btn">Reconnect</button>
    </div>

    <div class="card">
        <h2>Device Selection</h2>
        <div class="row">
            <button id="refresh-btn">List Devices</button>
            <select id="device-select" style="flex-grow: 1;">
                <option value="-1">Select a device...</option>
            </select>
        </div>
    </div>

    <div class="card">
        <h2>Controls</h2>
        <div class="row">
            <button id="get-controls-btn" disabled>Fetch Controls</button>
            <button id="test-read-btn" disabled>Read Value</button>
            <input type="text" id="manual-control-name" placeholder="Control Name">
            <input type="text" id="manual-control-val" placeholder="Value">
            <button id="manual-set-btn" disabled>Set</button>
        </div>
        <div id="controls-container">
            <div style="padding:10px; color:#888;">No controls loaded.</div>
        </div>
    </div>

    <div class="card">
        <h2>Log</h2>
        <div id="log" class="log-box"></div>
    </div>

    <script type="module">
        import { create } from '../lib/socketcluster-client.min.js';

        let socket = null;
        const logBox = document.getElementById('log');
        const scStatus = document.getElementById('sc-status');
        const deviceSelect = document.getElementById('device-select');
        const controlsContainer = document.getElementById('controls-container');

        function log(msg, type = 'rx') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.innerHTML = `<span class="log-time">${time}</span><span class="log-${type}">${msg}</span>`;
            logBox.insertBefore(entry, logBox.firstChild);
        }

        async function initSocketCluster() {
            if (socket) {
                socket.disconnect();
            }

            socket = create({
                hostname: window.location.hostname,
                port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
                path: '/socketcluster/'
            });
            
            (async () => {
                for await (let event of socket.listener('connect')) {
                    scStatus.textContent = "Connected";
                    scStatus.className = "status connected";
                    log("SocketCluster Connected", "tx");
                    subscribeToResponses();
                    document.getElementById('refresh-btn').click();
                }
            })();

            (async () => {
                for await (let event of socket.listener('disconnect')) {
                    scStatus.textContent = "Disconnected";
                    scStatus.className = "status disconnected";
                    log("SocketCluster Disconnected", "tx");
                }
            })();

            (async () => {
                for await (let {error} of socket.listener('error')) {
                    console.error('Socket Error:', error);
                }
            })();
        }

        async function subscribeToResponses() {
            const channel = socket.subscribe('uvcResponse');
            for await (let msg of channel) {
                handleMessage(msg);
            }
        }

        async function sendCommand(data) {
            if (!socket || socket.state !== 'open') {
                log("Error: Socket not open", "tx");
                return;
            }
            log("TX (Proc): " + data.action, "tx");
            try {
                // Use the procedure 'uvcCommand' defined in serverLogic.ts
                await socket.invoke('uvcCommand', data);
            } catch (err) {
                log("TX Error: " + err.message, "tx");
            }
        }

        function handleMessage(msg) {
            log("RX: " + JSON.stringify(msg), "rx");

            if (msg.action === "list_devices") {
                deviceSelect.innerHTML = '<option value="-1">Select a device...</option>';
                (msg.data || []).forEach(dev => {
                    const opt = document.createElement('option');
                    opt.value = dev.index;
                    opt.textContent = `${dev.name} (ID:${dev.productId})`;
                    deviceSelect.appendChild(opt);
                });
            } else if (msg.action === "select_device") {
                if (msg.success) {
                    document.getElementById('get-controls-btn').disabled = false;
                    document.getElementById('test-read-btn').disabled = false;
                    document.getElementById('manual-set-btn').disabled = false;
                    log("Device selected successfully", "rx");
                }
            } else if (msg.action === "get_controls") {
                renderControls(msg.data);
            }
        }

        function renderControls(controls) {
            controlsContainer.innerHTML = '';
            if (!controls || controls.length === 0) {
                controlsContainer.innerHTML = '<div style="padding:10px;">No controls found.</div>';
                return;
            }
            
            controls.forEach(c => {
                const div = document.createElement('div');
                div.className = 'control-item';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'control-name';
                nameSpan.textContent = c.name;
                
                const readBtn = document.createElement('button');
                readBtn.textContent = 'Read';
                readBtn.onclick = () => readValue(c.name);
                
                const valSpan = document.createElement('span');
                valSpan.style.fontSize = '0.8em';
                valSpan.style.color = '#666';
                valSpan.textContent = JSON.stringify(c["current-value"] || {});
                
                div.appendChild(nameSpan);
                div.appendChild(readBtn);
                div.appendChild(valSpan);
                controlsContainer.appendChild(div);
            });
        }
        
        function readValue(name) {
            sendCommand({ action: "get_value", control: name });
        }

        // Event Listeners
        document.getElementById('reconnect-btn').onclick = initSocketCluster;
        
        document.getElementById('refresh-btn').onclick = () => {
            sendCommand({ action: "list_devices" });
        };

        deviceSelect.onchange = () => {
            const idx = deviceSelect.value;
            if (idx !== "-1") {
                sendCommand({ action: "select_device", index: idx });
            }
        };

        document.getElementById('get-controls-btn').onclick = () => {
            sendCommand({ action: "get_controls" });
        };

        document.getElementById('manual-set-btn').onclick = () => {
            const name = document.getElementById('manual-control-name').value;
            const val = document.getElementById('manual-control-val').value;
            if (name && val) {
                sendCommand({ action: "set_value", control: name, value: val });
            }
        };
        
        document.getElementById('test-read-btn').onclick = () => {
             const name = document.getElementById('manual-control-name').value;
             if(name) readValue(name);
        };

        // Initial setup
        initSocketCluster();

    </script>
</body>
</html>
