<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoSphere Viewer - UVC Sync</title>
    <link rel="stylesheet" href="../lib/photo-sphere-viewer.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="viewer-container"></div>

    <div id="side-panel">
        <div class="header">
            <h1>PhotoSphere UVC</h1>
            <div class="status-bar">
                <div id="status-indicator" class="status-indicator"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </div>

        <div class="control-group">
            <h3>Mapping Sensitivity</h3>
            <div class="control-item">
                <label>Pan Sensitivity <span id="pan-sens-val" class="value-display">1.0</span></label>
                <input type="range" id="pan-sens" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
            <div class="control-item">
                <label>Tilt Sensitivity <span id="tilt-sens-val" class="value-display">1.0</span></label>
                <input type="range" id="tilt-sens" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
            <div class="control-item">
                <label>Zoom Sensitivity <span id="zoom-sens-val" class="value-display">1.0</span></label>
                <input type="range" id="zoom-sens" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
        </div>

        <div class="control-group">
            <h3>Animation</h3>
            <div class="control-item">
                <label>Smoothing <span id="smoothing-val" class="value-display">0.1</span></label>
                <input type="range" id="smoothing" min="0.01" max="1.0" step="0.01" value="0.1">
            </div>
        </div>

        <div class="control-group">
            <h3>Image Selection</h3>
            <div class="control-item">
                <label>Equirectangular Image</label>
                <select id="image-select">
                    <option value="../assets/sample_360.jpg">Sample 360</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <h3>Configuration</h3>
            <div class="control-item">
                <label>Device Name</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="device-name-input" placeholder="e.g. OBS Camera">
                    <button id="btn-update-name" style="width: auto; padding: 5px 10px; margin-bottom: 0;">Set</button>
                </div>
            </div>
        </div>

        <div class="control-group">
            <h3>UVC Data</h3>
            <div class="control-item">
                <label>Last Message</label>
                <div id="uvc-debug" style="font-family: monospace; font-size: 0.75rem; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; color: var(--text-muted); min-height: 40px; overflow-wrap: break-word; max-height: 150px; overflow-y: auto;">
                    Waiting for data...
                </div>
            </div>
        </div>

        <div style="margin-top: auto;">
            <button id="btn-reconnect">Reconnect Bridge</button>
        </div>
    </div>

    <!-- External Libraries -->
    <script type="importmap">
        {
            "imports": {
                "three": "../lib/three.module.js",
                "photo-sphere-viewer": "../lib/photo-sphere-viewer.module.js",
                "socketcluster-client": "../lib/socketcluster-client.min.js"
            }
        }
    </script>

    <script type="module" src="app.js"></script>
</body>
</html>
