<!DOCTYPE html>
<html>
<head>
    <title>OSC Listener (SocketCluster)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 20px; margin: 0; }
        #container { max-width: 800px; margin: 0 auto; }
        h1 { color: #569cd6; border-bottom: solid 1px #333; padding-bottom: 10px; }
        #status { margin-bottom: 20px; font-weight: bold; }
        #controls { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #1177bb; }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        button.on { background: #4ec9b0; color: #1e1e1e; }
        
        #messages { 
            background: #252526; 
            border: 1px solid #444; 
            border-radius: 4px;
            padding: 10px; 
            height: 60vh; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column-reverse;
        }
        .msg { 
            margin-bottom: 8px; 
            border-bottom: 1px solid #333; 
            padding: 8px;
            animation: fadeIn 0.3s ease-out;
        }
        .meta { color: #888; font-size: 0.85em; margin-bottom: 4px; }
        .address { color: #ce9178; font-weight: bold; }
        .args { color: #b5cea8; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-hint { color: #f44747; font-size: 0.9em; margin-left: 10px; }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="title">OSC Listener (SocketCluster)</h1>
        <div id="status">Connecting...</div>
        
        <div id="controls">
            <button id="toggleBtn">Toggle OSC (/4/toggle1)</button>
            <span id="hint" class="error-hint"></span>
        </div>

        <div id="messages"></div>
    </div>

    <!-- Load SocketCluster Client from our local lib folder -->
    <script type="module">
        import { create } from '../lib/socketcluster-client.min.js';

        const urlParams = new URLSearchParams(window.location.search);
        const targetDevice = urlParams.get('deviceName');
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');
        const titleEl = document.getElementById('title');
        const toggleBtn = document.getElementById('toggleBtn');
        const hintEl = document.getElementById('hint');

        let isOn = false;
        let socket = null;

        if (targetDevice) {
            titleEl.textContent = `OSC Listener: ${targetDevice}`;
            initSocketCluster();
        } else {
            titleEl.textContent = `OSC Listener: (All Devices)`;
            toggleBtn.disabled = true;
            hintEl.textContent = "Specify ?deviceName=... in URL to enable sending and listening";
            statusEl.textContent = 'Status: Device name required';
        }

        async function initSocketCluster() {
            try {
                // SocketCluster client options
                socket = create({
                    hostname: window.location.hostname,
                    port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
                    path: '/socketcluster/'
                });

                statusEl.textContent = `Status: Connecting...`;
                
                (async () => {
                    for await (let {error} of socket.listener('error')) {
                        console.error('Socket Error:', error);
                    }
                })();

                (async () => {
                    for await (let event of socket.listener('connect')) {
                        statusEl.textContent = `Status: Connected to SocketCluster`;
                        statusEl.style.color = '#4ec9b0';
                        console.warn('Connected to server');
                        subscribeToChannel();
                    }
                })();

                (async () => {
                    for await (let event of socket.listener('disconnect')) {
                        statusEl.textContent = 'Status: Disconnected';
                        statusEl.style.color = '#ce9178';
                    }
                })();

            } catch (e) {
                console.error('Init error:', e);
                statusEl.textContent = 'Status: Init Error';
                statusEl.style.color = '#f44747';
            }
        }

        async function subscribeToChannel() {
            if (!targetDevice) return;
            const channelName = `osc_out_${targetDevice}`;
            let channel = socket.subscribe(channelName);
            
            console.warn(`Subscribed to channel: ${channelName}`);

            for await (let data of channel) {
                addMessage(data);
            }
        }

        // --- Toggle Logic ---
        toggleBtn.onclick = async () => {
            if (!socket || socket.state !== 'open') {
                alert('Socket not connected');
                return;
            }
            
            const nextState = !isOn;
            const val = nextState ? 1 : 0;
            
            try {
                // Publish to the 'in' channel for the device
                const channelName = `osc_in_${targetDevice}`;
                socket.transmitPublish(channelName, {
                    address: '/4/toggle1',
                    args: [val]
                });
                
                isOn = nextState;
                toggleBtn.classList.toggle('on', isOn);
                toggleBtn.textContent = `Toggle OSC: ${isOn ? 'ON' : 'OFF'}`;
            } catch (e) {
                console.error('Socket publish error:', e);
                alert('Failed to send OSC message');
            }
        };

        function addMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg';
            
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.textContent = `${new Date().toLocaleTimeString()} - Device: ${data.deviceName}`;
            
            const content = document.createElement('div');
            // Assuming data.message is [address, ...args]
            const [address, ...args] = data.message;
            
            const addrSpan = document.createElement('span');
            addrSpan.className = 'address';
            addrSpan.textContent = address;
            
            const argsSpan = document.createElement('span');
            argsSpan.className = 'args';
            argsSpan.textContent = args.length > 0 ? ' ' + JSON.stringify(args) : '';
            
            content.appendChild(addrSpan);
            content.appendChild(argsSpan);
            
            div.appendChild(meta);
            div.appendChild(content);
            
            messagesEl.appendChild(div);
            
            if (messagesEl.children.length > 100) {
                messagesEl.removeChild(messagesEl.firstChild);
            }
        }
    </script>
</body>
</html>
