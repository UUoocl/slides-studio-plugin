<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaces r1b2</title>
</head>
<body>
  <script>const APP_FOLDER = "apps/pose_overlays/presets";</script>
    <script src="./lib/p5.js"></script>
    <script src="./sketch/r1b2.js"></script>
    <script src="./js/obsidian_save_load.js"></script>
    <script src="./js/manage_view.js"></script>

    <script type="module">
      import { create } from '../lib/socketcluster-client.min.js';

      const urlParams = new URLSearchParams(window.location.search);
      let channelName = urlParams.get('channel') || 'default_pose_channel';
      
      // If the channel name doesn't have a prefix, assume it's a MediaPipe vision task name
      if (!channelName.includes('mediapipe_in_')) {
        channelName = `mediapipe_in_${channelName}`;
      }

      const socket = create({
        hostname: window.location.hostname,
        port: window.location.port,
        path: '/socketcluster/'
      });

      (async () => {
        for await (let {error} of socket.listener('error')) {
          console.error('SocketCluster Error:', error);
        }
      })();

      (async () => {
        for await (let {status} of socket.listener('connect')) {
          console.log('SocketCluster Connected:', status);
        }
      })();

      const scChannel = socket.subscribe(channelName);
      loadPreset();

      (async () => {
        for await (let data of scChannel) {
          // Support new MediaPipeManager format (data.result) and legacy formats
          if (data.result) {
            const res = data.result;
            if (data.type === 'pose' && res.landmarks) {
              window.cur_data = res.landmarks[0];
            } else if (data.type === 'face' && res.faceLandmarks) {
              window.cur_data = res.faceLandmarks[0];
            } else if (data.type === 'hand' && res.landmarks) {
              window.cur_data = res.landmarks[0];
            }
          } else if (data.type === 'pose' && data.payload?.landmarks) {
            window.cur_data = data.payload.landmarks[0];
          } else if (data.type === 'face' && data.payload?.faceLandmarks) {
            window.cur_data = data.payload.faceLandmarks[0];
          } else if (data.type === 'hands' && data.payload?.landmarks) {
            window.cur_data = data.payload.landmarks[0];
          } else if (data.poseLandmarkerResult) {
            window.cur_data = Array.isArray(data.poseLandmarkerResult[0]) ? data.poseLandmarkerResult[0] : data.poseLandmarkerResult;
          } else if (Array.isArray(data)) {
            window.cur_data = Array.isArray(data[0]) ? data[0] : data;
          }
        }
      })();
    </script>


    <main id="p5_stage"></main>
<script id="sketchSettings">
      let hideCanvasUI = false;
  function getSketchSettings(filename){
      const settings = {
          "filename" : filename,
          "ephemeral" : ephemeralCheckBox.checked(),
          "ephemeral_alpha" : ephemeralAlphaSlider.value(),
          "fps" : FPSslider.value(),
          "inp1color" : inp1.value(),
          "inp2color" : inp2.value(),
          "inp3color" : inp3.value(),
          "inp4color" : inp4.value(),
          "inp5color" : inp5.value(),
          "inp6color" : inp6.value(),
          "inp7color" : inp7.value(),

          "bkgdColor" : bkgdColorPicker.value()
      }
      return settings
  }

  function setSketchSettings(json){
    
    EPHEMERAL =json.ephemeral;
    EPHEMERAL_ALPHA = json.ephemeral_alpha;
    if(ephemeralCheckBox) ephemeralCheckBox.checked(json.ephemeral);
    if(ephemeralAlphaSlider) ephemeralAlphaSlider.value(json.ephemeral_alpha);

    FPS = json.fps;
    
    if(inp1) inp1.value(json.inp1color);
    if(inp2) inp2.value(json.inp2color);
    if(inp3) inp3.value(json.inp3color);
    if(inp4) inp4.value(json.inp4color);
    if(inp5) inp5.value(json.inp5color);
    if(inp6) inp6.value(json.inp6color);
    if(inp7) inp7.value(json.inp7color);

    if(bkgdColorPicker) bkgdColorPicker.value(json.bkgdColor)
    PALETTE = ["Custom", '#00000000', [
    json.inp1color, json.inp2color, json.inp3color, json.inp4color, json.inp5color, json.inp6color, json.inp7color,
    json.inp1color, json.inp2color, json.inp3color, json.inp4color, json.inp5color, json.inp6color, json.inp7color,
    json.inp1color, json.inp2color, json.inp3color, json.inp4color, json.inp5color, json.inp6color, json.inp7color,
    json.inp1color, json.inp2color, json.inp3color, json.inp4color, json.inp5color, json.inp6color, json.inp7color,
    json.inp1color, json.inp2color, json.inp3color
    ]]
    PALETTES[0] = PALETTE

    // The r1b2.js script might define newPaintLines globally or within the sketch
    // If it's the old version referenced, we call it to refresh lines with new colors
    if(typeof newPaintLines === 'function') {
        newPaintLines();
    } else if (window.newPaintLines) {
        window.newPaintLines();
    }
    
    if(hideCanvasUI && stage && stage.setup){
        stage.setup()
    }
    
  }
</script>

</body>
