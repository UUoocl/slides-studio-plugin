<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2 - Display</title>
    <style>
      body { padding: 0; margin: 0; background: transparent !important; overflow: hidden; }
      canvas { vertical-align: top; }
      /* Hide all UI elements */
      #obsidian-save-ui-layer { display: none !important; }
    </style>
</head>
<body>
    <script>const APP_FOLDER = "apps/pose_overlays/presets";</script>
    <script src="./lib/p5.js"></script>
    <script src="./sketch/gemini2.js"></script>
    <script src="./js/obsidian_save_load.js"></script>
    <script src="./js/manage_view.js"></script>

    <main id="p5_stage"></main>
<script id="sketchSettings">
      let hideCanvasUI = true;
  function getSketchSettings(filename){
      const settings = {
          "filename" : filename,
          "ephemeral" : ephemeralCheckBox.checked(),
          "ephemeral_alpha" : ephemeralAlphaSlider.value(),
          "fps" : FPSslider.value(),
          "inp1color" : inp1.value(),
          "inp2color" : inp2.value(),
          "inp3color" : inp3.value(),
          "inp4color" : inp4.value(),
          "inp5color" : inp5.value(),
          "inp6color" : inp6.value(),
          "inp7color" : inp7.value(),
          "bkgdColor" : bkgdColorPicker.value()
      }
      return settings
  }

  function setSketchSettings(json){
    if (!json) return;
    EPHEMERAL =json.ephemeral;
    EPHEMERAL_ALPHA = json.ephemeral_alpha;
    if(ephemeralCheckBox) ephemeralCheckBox.checked(json.ephemeral);
    if(ephemeralAlphaSlider) ephemeralAlphaSlider.value(json.ephemeral_alpha);

    FPS = json.fps;
    
    if(inp1) inp1.value(json.inp1color);
    if(inp2) inp2.value(json.inp2color);
    if(inp3) inp3.value(json.inp3color);
    if(inp4) inp4.value(json.inp4color);
    if(inp5) inp5.value(json.inp5color);
    if(inp6) inp6.value(json.inp6color);
    if(inp7) inp7.value(json.inp7color);

    if(bkgdColorPicker && typeof bkgdColorPicker.value === 'function') bkgdColorPicker.value(json.bkgdColor);

    PALETTE = ["Custom", '#00000000', [
    json.inp1color, json.inp2color, json.inp3color, json.inp4color, json.inp5color, json.inp6color, json.inp7color,
    json.inp1color, json.inp2color, json.inp3color, json.inp4color, json.inp5color, json.inp6color, json.inp7color,
    json.inp1color, json.inp2color, json.inp3color, json.inp4color, json.inp5color, json.inp6color, json.inp7color,
    json.inp1color, json.inp2color, json.inp3color, json.inp4color, json.inp5color, json.inp6color, json.inp7color,
    json.inp1color, json.inp2color, json.inp3color
    ]]
    PALETTES[0] = PALETTE

    if(typeof newPaintLines === 'function') {
        newPaintLines();
    } else if (window.newPaintLines) {
        window.newPaintLines();
    }
    
    if(hideCanvasUI && stage && stage.setup){
        stage.setup()
    }
    
  }
</script>
<script src="./js/pose_sc_sync.js" type="module"></script>
</body>
</html>
