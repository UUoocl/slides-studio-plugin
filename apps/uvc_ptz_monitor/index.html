<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVC PTZ Monitor - Slides Studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="status-bar">
        <div class="logo">UVC PTZ Monitor</div>
        <div id="status" class="status-indicator">Initializing...</div>
    </header>

    <main class="container">
        <section class="selection-panel card">
            <h2>Device Selection</h2>
            <div class="control-group">
                <label for="camera-select">Select Camera:</label>
                <select id="camera-select" class="styled-select">
                    <option value="">-- No camera selected --</option>
                </select>
                <button id="refresh-devices" class="btn btn-secondary">Refresh</button>
            </div>
        </section>

        <section class="viewer-panel card">
            <h2>Live Preview</h2>
            <div class="video-container">
                <video id="preview" autoplay playsinline muted></video>
                <div id="video-overlay" class="video-overlay">No video active</div>
            </div>
        </section>

        <section class="controls-panel card">
            <h2>PTZ Controls</h2>
            <div id="controls-container" class="controls-container">
                <p class="placeholder-text">Select a camera to reveal PTZ controls.</p>
                <!-- Controls will be injected here -->
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
