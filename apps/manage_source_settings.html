<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage OBS Browser Source Settings</title>
    <style>
        :root {
            --background-primary: #1e1e1e;
            --background-secondary: #252526;
            --text-normal: #cccccc;
            --text-muted: #888888;
            --interactive-accent: #0e639c;
            --interactive-hover: #1177bb;
            --border-color: #3e3e42;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-primary);
            color: var(--text-normal);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--text-normal);
            margin-bottom: 20px;
        }

        #status {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 4px;
            background-color: var(--background-secondary);
            border: 1px solid var(--border-color);
        }

        #source-list {
            width: 100%;
            max-width: 600px;
            list-style: none;
            padding: 0;
        }

        .source-item {
            background-color: var(--background-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-name {
            font-weight: bold;
        }

        .settings-link {
            background-color: var(--interactive-accent);
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .settings-link:hover {
            background-color: var(--interactive-hover);
        }

        .no-sources {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>OBS Browser Source Settings</h1>
    <div id="status">Connecting to OBS Proxy...</div>
    <ul id="source-list">
        <li class="no-sources">No marked browser sources found.</li>
    </ul>

    <script type="module">
        import * as socketClusterClient from './lib/socketcluster-client.min.js';
        
        let socket;
        const statusDiv = document.getElementById('status');
        const sourceList = document.getElementById('source-list');

        function updateStatus(text, connected) {
            statusDiv.textContent = text;
            statusDiv.style.borderColor = connected ? '#4caf50' : '#f44336';
            statusDiv.style.color = connected ? '#4caf50' : '#f44336';
        }

        async function connect() {
            updateStatus('Connecting to OBS Proxy...', false);
            
            try {
                const hostname = window.location.hostname || 'localhost';
                const port = window.location.port || '8080';
                
                socket = socketClusterClient.create({
                    hostname: hostname,
                    port: parseInt(port),
                    path: '/socketcluster/',
                    secure: window.location.protocol === 'https:',
                    autoReconnect: true
                });

                (async () => {
                    for await (let { error } of socket.listener('error')) {
                        console.error('Socket error:', error);
                        updateStatus('Connection Error', false);
                    }
                })();

                (async () => {
                    for await (let event of socket.listener('connect')) {
                        console.log('Connected to SocketCluster');
                        updateStatus('Connected to OBS Proxy', true);
                        fetchBrowserSources();
                    }
                })();

                (async () => {
                    for await (let event of socket.listener('disconnect')) {
                        updateStatus('Disconnected from OBS Proxy', false);
                    }
                })();

            } catch (err) {
                console.error('Connection failed:', err);
                updateStatus('Connection Failed', false);
            }
        }

        async function fetchBrowserSources() {
            if (!socket) return;
            console.log('Fetching browser sources...');
            
            try {
                // 1. Get all inputs from OBS
                const response = await socket.invoke('obsRequest', {
                    requestType: 'GetInputList'
                });

                const inputs = response.inputs || [];
                const browserSources = inputs.filter(input => input.inputKind === 'browser_source');
                
                sourceList.innerHTML = '';
                let markedCount = 0;

                for (const source of browserSources) {
                    // 2. Get settings for each browser source to check for the marker
                    const settingsResponse = await socket.invoke('obsRequest', {
                        requestType: 'GetInputSettings',
                        requestData: { inputName: source.inputName }
                    });

                    const css = settingsResponse.inputSettings.css || '';
                    if (css.includes('--slides-studio-refresh: 1;')) {
                        addSourceToUI(source.inputName, settingsResponse.inputSettings.url);
                        markedCount++;
                    }
                }

                if (markedCount === 0) {
                    sourceList.innerHTML = '<li class="no-sources">No marked browser sources found.</li>';
                }

            } catch (err) {
                console.error('Failed to fetch sources:', err);
                updateStatus('Error fetching sources', false);
            }
        }

        function addSourceToUI(name, url) {
            const li = document.createElement('li');
            li.className = 'source-item';
            
            // Try to infer the settings page name
            // e.g. .../stripes.html -> stripes_settings.html
            let settingsUrl = '#';
            if (url) {
                try {
                    // Handle both full URLs and potential local paths
                    let urlObj;
                    if (url.startsWith('http')) {
                        urlObj = new URL(url);
                    } else {
                        // For local paths, we'll try to treat it as relative to the current app
                        // but usually OBS browser sources will have full http://localhost:PORT/ paths
                        urlObj = new URL(url, window.location.origin);
                    }

                    const pathname = urlObj.pathname;
                    if (pathname.endsWith('.html')) {
                        const newPathname = pathname.replace('.html', '_settings.html');
                        urlObj.pathname = newPathname;
                        settingsUrl = urlObj.toString();
                    }
                } catch (e) {
                    console.warn('Could not parse URL:', url, e);
                    // Fallback to simple logic if URL parsing fails
                    const parts = url.split('/');
                    const filename = parts.pop();
                    if (filename && filename.endsWith('.html')) {
                        const base = filename.replace('.html', '');
                        settingsUrl = parts.join('/') + '/' + base + '_settings.html';
                    }
                }
            }

            li.innerHTML = `
                <span class="source-name">${name}</span>
                <a href="${settingsUrl}${settingsUrl.includes('?') ? '&' : '?'}obsSourceName=${encodeURIComponent(name)}" class="settings-link" target="_blank">Open Settings</a>
            `;
            sourceList.appendChild(li);
        }

        window.addEventListener('DOMContentLoaded', connect);
    </script>
</body>
</html>
