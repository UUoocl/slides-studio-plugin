<!DOCTYPE html>
<html>
<head>
    <title>Keyboard Monitor (SocketCluster)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #key-display {
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 40px;
            border-radius: 20px;
            font-size: 72px;
            font-weight: bold;
            min-width: 200px;
            text-align: center;
            border: 4px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
            transform: scale(0.8);
        }
        #key-display.active {
            opacity: 1;
            transform: scale(1);
        }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        .history {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="info">
        Keyboard Monitor (SocketCluster)<br>
        Status: Disconnected
    </div>
    
    <div id="key-display"></div>
    <div class="history" id="history"></div>

    <script type="module">
        import { create } from '../lib/socketcluster-client.min.js';

        const keyDisplay = document.getElementById('key-display');
        const historyDisplay = document.getElementById('history');
        const info = document.getElementById('info');
        const history = [];
        const MAX_HISTORY = 5;
        let showCombinations = true;

        const socket = create({
            hostname: window.location.hostname,
            port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
            path: '/socketcluster/'
        });

        (async () => {
            for await (let {error} of socket.listener('error')) {
                console.error('SocketCluster error:', error);
            }
        })();

        (async () => {
            for await (let event of socket.listener('connect')) {
                console.log('Connected to SocketCluster');
                updateStatus('Connected');
                socket.invoke('setInfo', { name: 'Keyboard Monitor' });
            }
        })();

        (async () => {
            for await (let event of socket.listener('disconnect')) {
                console.log('Disconnected from SocketCluster');
                updateStatus('Disconnected');
            }
        })();

        function updateStatus(status) {
            if (!info) return;
            info.innerHTML = `Keyboard Monitor (SocketCluster)<br>Status: ${status}`;
        }

        // Listen for keyboard events
        (async () => {
            const channel = socket.subscribe('keyboardPress');
            for await (let data of channel) {
                const { key, combo } = data;
                const activeKey = showCombinations ? combo : key;
                showKey(activeKey);
            }
        })();

        (async () => {
            const channel = socket.subscribe('keyboardRelease');
            for await (let data of channel) {
                const { key, combo } = data;
                hideKey(showCombinations ? combo : key);
            }
        })();

        // Listen for setting updates (optional)
        (async () => {
            const channel = socket.subscribe('keyboardSettings');
            for await (let data of channel) {
                if (typeof data.showCombinations !== 'undefined') {
                    showCombinations = data.showCombinations;
                }
            }
        })();

        function showKey(key) {
            if (!keyDisplay) return;
            let displayKey = formatKey(key);
            keyDisplay.textContent = displayKey;
            keyDisplay.classList.add('active');
        }

        function hideKey(key) {
            if (keyDisplay) keyDisplay.classList.remove('active');
            
            let displayKey = formatKey(key, true);
            if (displayKey) {
                history.push(displayKey);
                if (history.length > MAX_HISTORY) history.shift();
                updateHistory();
            }
        }

        function formatKey(key, isHistory = false) {
            if (!key) return "";
            let displayKey = key;
            
            if (key.startsWith('Key.')) {
                displayKey = key.replace('Key.', '').toUpperCase();
            }
            if (key === "' '") displayKey = isHistory ? "␣" : "SPACE";
            if (key.startsWith("'") && key.endsWith("'")) {
                displayKey = key.slice(1, -1).toUpperCase();
            }
            
            if (displayKey.includes(" + ")) {
                return displayKey.split(" + ").map(part => formatKey(part, isHistory)).join(" + ");
            }

            return displayKey;
        }

        function updateHistory() {
            if (!historyDisplay) return;
            historyDisplay.innerHTML = history.map(k => `<span>${k}</span>`).join(' &rsaquo; ');
        }
    </script>
</body>
</html>
