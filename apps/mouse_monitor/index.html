<!DOCTYPE html>
<html>
<head>
    <title>Mouse Monitor (WebSocket)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: transparent;
            font-family: sans-serif;
        }
        #cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 0, 0, 0.5);
            border: 2px solid red;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: width 0.1s, height 0.1s, background-color 0.1s;
            z-index: 1000;
        }
        #cursor.clicked {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 0, 0.8);
        }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        .scroll-indicator {
            position: absolute;
            width: 4px;
            background-color: cyan;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="info">
        Mouse Monitor (WebSocket)<br>
        Status: Disconnected
    </div>

    <script type="module">
        import { create } from '../lib/slides-studio-client.js';

        const cursor = document.getElementById('cursor');
        const info = document.getElementById('info');

        const socket = create({
            hostname: window.location.hostname,
            port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
            path: '/websocket/',
            authToken: { name: 'Mouse-Monitor' }
        });

        (async () => {
            for await (let {error} of socket.listener('error')) {
                console.error('WebSocket error:', error);
            }
        })();

        (async () => {
            for await (let event of socket.listener('connect')) {
                updateStatus('Connected');
                socket.invoke('setInfo', { name: 'Mouse Monitor' });
            }
        })();

        (async () => {
            for await (let event of socket.listener('disconnect')) {
                updateStatus('Disconnected');
            }
        })();

        function updateStatus(status) {
            if (!info) return;
            info.innerHTML = `Mouse Monitor (WebSocket)<br>Status: ${status}`;
        }

        // Listen for mouse events
        (async () => {
            const channel = socket.subscribe('mousePosition');
            for await (let data of channel) {
                const { x, y } = data;
                if (cursor) {
                    cursor.style.left = x + 'px';
                    cursor.style.top = y + 'px';
                }
            }
        })();

        (async () => {
            const channel = socket.subscribe('mouseClick');
            for await (let data of channel) {
                const { button, pressed } = data;
                if (pressed && cursor) {
                    cursor.classList.add('clicked');
                    setTimeout(() => cursor.classList.remove('clicked'), 200);
                }
            }
        })();

        (async () => {
            const channel = socket.subscribe('mouseScroll');
            for await (let data of channel) {
                const { dx, dy } = data;
                showScroll(dx, dy);
            }
        })();

        function showScroll(dx, dy) {
            if (!document.body || !cursor) return;
            
            const indicator = document.createElement('div');
            indicator.className = 'scroll-indicator';
            indicator.style.left = cursor.style.left;
            indicator.style.top = cursor.style.top;
            indicator.style.height = Math.abs(dy * 10) + 'px';
            indicator.style.opacity = 1;
            if (dy > 0) indicator.style.transform = 'translateY(-100%)';
            
            document.body.appendChild(indicator);
            
            setTimeout(() => {
                indicator.style.opacity = 0;
                setTimeout(() => indicator.remove(), 500);
            }, 100);
        }
    </script>
</body>
</html>
