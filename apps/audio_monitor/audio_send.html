<!DOCTYPE html>
<html>
<head>
    <title>Audio Monitor (WebSocket)</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #222;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        h1 { margin-top: 0; color: #fff; font-size: 24px; text-align: center; }
        .control-group {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .control-group:last-child { border-bottom: none; }
        label {
            display: block;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        select, input, button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        select:focus, input:focus { outline: none; border-color: #00ffcc; }
        
        button {
            cursor: pointer;
            font-weight: bold;
            border: none;
            margin-top: 10px;
        }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .btn-monitor { background: #007bff; color: white; }
        .btn-monitor.active { background: #dc3545; }
        
        .btn-stt { background: #00ffcc; color: #111; }
        .btn-stt.active { background: #dc3545; color: white; }
        
        .btn-fft { background: #ffaa00; color: #111; }
        .btn-fft.active { background: #dc3545; color: white; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            background: #555;
        }
        .status-dot.connected { background: #00ffcc; box-shadow: 0 0 5px #00ffcc; }

        .transcript {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
            margin-top: 15px;
            font-size: 18px;
            line-height: 1.4;
            color: #00ffcc;
            border-left: 4px solid #00ffcc;
            word-wrap: break-word;
        }

        canvas {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        canvas.active { display: block; }

        .range-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        .range-container input { flex: 1; margin-top: 0; }
        .range-val { width: 50px; text-align: right; color: #00ffcc; font-weight: bold; }

        .pulse {
            width: 8px;
            height: 8px;
            background: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
        }
    </style>
    <script src="lib/slides-studio-client.js"></script>
</head>
<body>
    <div class="container">
        <h1>Audio Monitor</h1>
        
        <!-- Microphone Selection & Monitoring -->
        <div class="control-group">
            <label>Microphone Input</label>
            <select id="mic-select">
                <option value="">Loading devices...</option>
            </select>
            <button id="btn-monitor" class="btn-monitor">Start Monitoring</button>
            <div class="status-bar">
                <span>Device ID: <span id="current-device-id">None</span></span>
                <span><span id="ws-dot" class="status-dot"></span> Status: <span id="ws-status">Disconnected</span></span>
            </div>
        </div>

        <!-- Speech to Text -->
        <div class="control-group">
            <label>Speech-to-Text (On-Device)</label>
            <button id="btn-stt" class="btn-stt" disabled>Start STT</button>
            <div id="stt-status" style="font-size: 12px; color: #888; margin-top: 10px;">Ready to start</div>
            <div id="stt-actions"></div>
            <div id="transcript" class="transcript">Transcript will appear here...</div>
        </div>

        <!-- FFT Analysis -->
        <div class="control-group">
            <label>FFT Analysis & Streaming</label>
            <button id="btn-fft" class="btn-fft" disabled>Start FFT</button>
            <canvas id="fft-canvas"></canvas>
            
            <div class="range-container">
                <label style="margin-bottom:0; flex:1;">Send Rate (ms)</label>
                <input type="range" id="rate-slider" min="20" max="1000" value="100">
                <span id="rate-val" class="range-val">100ms</span>
            </div>
        </div>
    </div>

    <script>
        const micSelect = document.getElementById('mic-select');
        const btnMonitor = document.getElementById('btn-monitor');
        const btnStt = document.getElementById('btn-stt');
        const btnFft = document.getElementById('btn-fft');
        const transcriptEl = document.getElementById('transcript');
        const sttStatus = document.getElementById('stt-status');
        const sttActions = document.getElementById('stt-actions');
        const fftCanvas = document.getElementById('fft-canvas');
        const wsStatus = document.getElementById('ws-status');
        const wsDot = document.getElementById('ws-dot');
        const rateSlider = document.getElementById('rate-slider');
        const rateVal = document.getElementById('rate-val');
        const deviceIdText = document.getElementById('current-device-id');

        let audioContext = null;
        let stream = null;
        let source = null;
        let analyser = null;
        let recognition = null;
        let isMonitoring = false;
        let isSttActive = false;
        let isFftActive = false;
        let fftInterval = null;
        let sendRate = 100;
        let deviceLabel = "audio_monitor_1";

        // WebSocket Setup
        const options = {
            hostname: window.location.hostname,
            port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
            path: '/websocket/',
            authToken: { name: 'Audio-Send' }
        };
        const socket = create(options);

        (async () => {
            for await (let event of socket.listener('connect')) {
                wsStatus.textContent = 'Connected';
                wsDot.classList.add('connected');
            }
        })();

        (async () => {
            for await (let event of socket.listener('disconnect')) {
                wsStatus.textContent = 'Disconnected';
                wsDot.classList.remove('connected');
            }
        })();

        // Device Enumeration
        async function getDevices() {
            try {
                // Initial request to get labels
                const temp = await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                temp.getTracks().forEach(t => t.stop());

                const audioInputs = devices.filter(d => d.kind === 'audioinput');
                micSelect.innerHTML = audioInputs.map(d => 
                    `<option value="${d.deviceId}">${d.label || 'Unknown Microphone'}</option>`
                ).join('');
            } catch (err) {
                micSelect.innerHTML = '<option value="">Permission Denied</option>';
                console.error("Device access error:", err);
            }
        }

        getDevices();

        // Monitor Toggle
        btnMonitor.onclick = async () => {
            if (!isMonitoring) {
                await startMonitoring();
            } else {
                stopMonitoring();
            }
        };

        async function startMonitoring() {
            const deviceId = micSelect.value;
            deviceLabel = micSelect.options[micSelect.selectedIndex].text.replace(/\s+/g, '_').toLowerCase();
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    audio: { deviceId: { exact: deviceId } }
                });

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                isMonitoring = true;
                btnMonitor.textContent = "Stop Monitoring";
                btnMonitor.classList.add('active');
                btnStt.disabled = false;
                btnFft.disabled = false;
                deviceIdText.textContent = deviceId.substring(0, 8) + "...";
                micSelect.disabled = true;

                // Setup STT
                setupSTT();
            } catch (err) {
                console.error("Failed to start monitoring:", err);
                alert("Could not access microphone.");
            }
        }

        function stopMonitoring() {
            if (isSttActive) stopSTTInternal();
            if (isFftActive) toggleFFT();

            if (stream) stream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();

            isMonitoring = false;
            btnMonitor.textContent = "Start Monitoring";
            btnMonitor.classList.remove('active');
            btnStt.disabled = true;
            btnFft.disabled = true;
            micSelect.disabled = false;
            deviceIdText.textContent = "None";
        }

        // STT Logic
        function setupSTT() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                btnStt.textContent = "STT Unsupported";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = navigator.language || 'en-US';
            recognition.processLocally = true;

            recognition.onresult = (event) => {
                let result = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    result += event.results[i][0].transcript;
                }
                if (result) {
                    transcriptEl.textContent = result;
                    if (socket.state === 'open') {
                        socket.transmitPublish('audio_stt', { device: deviceLabel, stt: result });
                    }
                }
            };

            recognition.onerror = (event) => {
                console.error("Recognition error:", event.error);
                if (event.error === 'no-speech' || event.error === 'aborted') return;
                sttStatus.textContent = "Error: " + event.error;
                
                if (event.error === 'network') {
                    sttStatus.innerHTML += "<br><small>Chrome on-device processing failed. Check chrome://settings/accessibility</small>";
                }
            };

            recognition.onend = () => {
                if (isSttActive) {
                    setTimeout(() => {
                        try { recognition.start(); } catch (e) {}
                    }, 300);
                }
            };
        }

        btnStt.onclick = toggleSTT;

        function showDownloadButton(lang) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const btn = document.createElement('button');
            btn.textContent = "Download language pack";
            btn.style.marginTop = "10px";
            btn.style.background = "#ffaa00";
            btn.style.color = "#111";
            btn.onclick = async () => {
                btn.remove();
                sttStatus.textContent = "Downloading...";
                try {
                    const success = await SpeechRecognition.install({ langs: [lang], processLocally: true });
                    if (success) {
                        startSTT();
                    } else {
                        sttStatus.textContent = "Download failed.";
                    }
                } catch (e) {
                    sttStatus.textContent = "Install error: " + e.message;
                }
            };
            sttActions.innerHTML = '';
            sttActions.appendChild(btn);
        }

        async function toggleSTT() {
            if (!recognition) return;
            if (!isSttActive) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const lang = recognition.lang;

                if (SpeechRecognition.available) {
                    sttStatus.textContent = "Checking for on-device language support...";
                    try {
                        const result = await SpeechRecognition.available({ langs: [lang], processLocally: true });
                        if (result === "available") {
                            startSTT();
                        } else if (result === "unavailable") {
                            sttStatus.textContent = `Language pack ${lang} not available.`;
                        } else {
                            sttStatus.textContent = "Language pack download required.";
                            showDownloadButton(lang);
                        }
                    } catch (e) {
                        console.error("SpeechRecognition.available error:", e);
                        startSTT();
                    }
                } else {
                    startSTT();
                }
            } else {
                stopSTTInternal();
            }
        }

        function startSTT() {
            try {
                recognition.start();
                isSttActive = true;
                btnStt.textContent = "Stop STT";
                btnStt.classList.add('active');
                transcriptEl.textContent = "Listening...";
                sttStatus.innerHTML = '<span class="pulse"></span> Active (On-Device)';
                sttActions.innerHTML = '';
            } catch (e) {
                console.error("Start failed:", e);
                sttStatus.textContent = "Start failed: " + e.message;
                isSttActive = false;
            }
        }

        function stopSTTInternal() {
            isSttActive = false;
            recognition.stop();
            btnStt.textContent = "Start STT";
            btnStt.classList.remove('active');
            sttStatus.textContent = "Stopped";
            sttActions.innerHTML = '';
        }

        // FFT Logic
        btnFft.onclick = toggleFFT;
        function toggleFFT() {
            if (!isFftActive) {
                isFftActive = true;
                btnFft.textContent = "Stop FFT";
                btnFft.classList.add('active');
                fftCanvas.classList.add('active');
                startFFTPublishing();
                requestAnimationFrame(drawFFT);
            } else {
                isFftActive = false;
                btnFft.textContent = "Start FFT";
                btnFft.classList.remove('active');
                fftCanvas.classList.remove('active');
                if (fftInterval) clearInterval(fftInterval);
            }
        }

        function startFFTPublishing() {
            if (fftInterval) clearInterval(fftInterval);
            fftInterval = setInterval(() => {
                if (!isFftActive || !analyser) return;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                if (socket.state === 'open') {
                    // Convert to normal array for JSON
                    const fftArray = Array.from(dataArray);
                    socket.transmitPublish('audio_fft', { device: deviceLabel, fft: fftArray });
                }
            }, sendRate);
        }

        function drawFFT() {
            if (!isFftActive || !analyser) return;
            const ctx = fftCanvas.getContext('2d');
            const width = fftCanvas.width;
            const height = fftCanvas.height;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            ctx.clearRect(0, 0, width, height);
            const barWidth = (width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 2;
                ctx.fillStyle = `rgb(${barHeight + 100}, 255, 204)`;
                ctx.fillRect(x, height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
            requestAnimationFrame(drawFFT);
        }

        rateSlider.oninput = () => {
            sendRate = parseInt(rateSlider.value);
            rateVal.textContent = sendRate + 'ms';
            if (isFftActive) startFFTPublishing();
        };

    </script>
</body>
</html>
