<!DOCTYPE html>
<html>
<head>
    <title>Audio FFT Visualizer (SocketCluster)</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            background-color: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-y: auto;
        }
        #visualizers-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .visualizer-card {
            background: #222;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .visualizer-card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 18px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            color: #00ffcc;
        }
        canvas {
            width: 100%;
            height: 150px;
            background: #000;
            border-radius: 5px;
        }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
        }
        .no-data {
            color: #888;
            font-style: italic;
            text-align: center;
            width: 100%;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div id="info">
        Audio FFT Visualizer (SocketCluster)<br>
        Status: Disconnected
    </div>

    <div id="visualizers-container">
        <div class="no-data" id="no-data-msg">Waiting for SocketCluster data...</div>
    </div>

    <script type="module">
        import { create } from '../lib/socketcluster-client.min.js';

        const container = document.getElementById('visualizers-container');
        const noDataMsg = document.getElementById('no-data-msg');
        const info = document.getElementById('info');
        const devices = new Map(); // name -> { card, ctx, lastUpdate }

        const socket = create({
            hostname: window.location.hostname,
            port: window.location.port || (window.location.protocol === 'https:' ? 443 : 80),
            path: '/socketcluster/',
            authToken: { name: 'Audio-FFT-Viz' }
        });

        (async () => {
            for await (let {error} of socket.listener('error')) {
                console.error('SocketCluster error:', error);
            }
        })();

        (async () => {
            for await (let event of socket.listener('connect')) {
                console.log('Connected to SocketCluster');
                updateStatus('Connected');
            }
        })();

        (async () => {
            for await (let event of socket.listener('disconnect')) {
                console.log('Disconnected from SocketCluster');
                updateStatus('Disconnected');
            }
        })();

        function updateStatus(status) {
            if (!info) return;
            info.innerHTML = `Audio FFT Visualizer (SocketCluster)<br>Status: ${status}`;
        }

        // Listen for audio FFT events
        (async () => {
            const channel = socket.subscribe('audio_fft');
            for await (let data of channel) {
                const { device, fft } = data;

                if (!devices.has(device)) {
                    createVisualizer(device);
                }

                const deviceData = devices.get(device);
                deviceData.lastUpdate = Date.now();
                drawFFT(deviceData.ctx, fft);
            }
        })();

        function createVisualizer(name) {
            if (!container) return;
            if (noDataMsg) noDataMsg.style.display = 'none';

            const card = document.createElement('div');
            card.className = 'visualizer-card';
            card.innerHTML = `<h3>${name}</h3><canvas id="canvas-${name}"></canvas>`;
            container.appendChild(card);

            const canvas = card.querySelector('canvas');
            canvas.width = 800;
            canvas.height = 300;
            const ctx = canvas.getContext('2d');

            devices.set(name, {
                card,
                ctx,
                lastUpdate: Date.now()
            });
        }

        function drawFFT(ctx, data) {
            if (!ctx) return;
            const width = ctx.canvas.width;
            const height = ctx.canvas.height;
            const barWidth = width / data.length;

            ctx.clearRect(0, 0, width, height);
            
            const gradient = ctx.createLinearGradient(0, height, 0, 0);
            gradient.addColorStop(0, '#003322');
            gradient.addColorStop(1, '#00ffcc');
            ctx.fillStyle = gradient;

            for (let i = 0; i < data.length; i++) {
                const barHeight = (data[i] / 255) * height;
                ctx.fillRect(i * barWidth, height - barHeight, barWidth - 1, barHeight);
            }
        }

        // Cleanup stale devices
        setInterval(() => {
            const now = Date.now();
            for (const [name, data] of devices.entries()) {
                if (now - data.lastUpdate > 5000) {
                    data.card.remove();
                    devices.delete(name);
                    if (devices.size === 0 && noDataMsg) {
                        noDataMsg.style.display = 'block';
                    }
                }
            }
        }, 2000);
    </script>
</body>
</html>
