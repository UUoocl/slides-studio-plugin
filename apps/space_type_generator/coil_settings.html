<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>STG _v.coil - Settings</title>
    <script src="./js/p5.min.1.0.0.js"></script>
    <link rel="stylesheet" type="text/css" href="./css/stgStyle.css" />
    <script src="./js/sketch_coil.js" type="text/javascript"></script>
    <script src="./js/keyboardEngine_190221.js" type="text/javascript"></script>
    <style>
      body { padding: 0; margin: 0; }
      canvas { vertical-align: top; }
    </style>
  </head>
  <body>
    <div class="bottom">
      <h1>SPACE TYPE GENERATOR</h1>
      <h2>_v. Coil</h2>
      <textarea id="textfield" autofocus="">SPACE TYPE GENERATOR _V.COIL</textarea>
      <div class="slug">
        <p>
          a kinetic type generator from <a href="http://www.kielm.com">kielm</a><br /><br />
          <a href="https://www.buymeacoffee.com/kieldm">Buy me a coffee</a> to help support STG<br />
        </p>
        <button onclick="myFunction()">ReadMe</button>
      </div>
    </div>

    <script src="./js/stg_menu.js"></script>
    <script src="./js/obsidian_save_load.js"></script>
    <script src="./js/manage_view.js"></script>
    <script src="./js/keyboard_input.js"></script>
    
    <script id="sketchSettings">
      function getSketchSettings(filename){
          const settings = {
              "filename" : filename,
              "typeX" : typeXSlider.value(),
              "typeY" : typeYSlider.value(),
              "typeStroke" : typeStrokeSlider.value(),
              
              "ribbonCount" : ribbonCountSlider.value(),
              "ribbonSize" : ribbonSizeSlider.value(),
              
              "radioEnd" : radioEnd.value(),
              
              "radius" : radiusSlider.value(),
              "tracker" : trackerSlider.value(),
              "spiralStart" : spiralStartSlider.value(),
              "spin" : spinSlider.value(),
              
              "waveSize" : waveSizeSlider.value(),
              "waveCount" : waveCountSlider.value(),
              "waveSpeed" : waveSpeedSlider.value(),
              "slope" : slopeSlider.value(),

              "inp1color" : inp1.value(),
              "inp2color" : inp2.value(),
              "inp3color" : inp3.value(),
              "inp4color" : inp4.value(),
              "inp5color" : inp5.value(),
              
              "inp0check" : inp0check.checked(),
              "inp1check" : inp1check.checked(),
              "inp2check" : inp2check.checked(),
              "inp3check" : inp3check.checked(),
              "inp4check" : inp4check.checked(),
              "inp5check" : inp5check.checked(),
              
              "text" : inp.value(),
              "inpNumber" : inpNumber,
              "bkgdColor" : bkgdColorPicker.value()
          }
          if (typeof inp6 !== 'undefined' && inp6 !== null) {
              settings.inp6color = inp6.toString();
          }
          return settings
      }

      function setSketchSettings(json){
          if (!json) return;
          if (typeof typeXSlider !== 'undefined') typeXSlider.value(json.typeX);
          if (typeof typeYSlider !== 'undefined') typeYSlider.value(json.typeY);
          if (typeof typeStrokeSlider !== 'undefined') typeStrokeSlider.value(json.typeStroke);
          
          if (typeof ribbonCountSlider !== 'undefined') ribbonCountSlider.value(json.ribbonCount);
          if (typeof ribbonSizeSlider !== 'undefined') ribbonSizeSlider.value(json.ribbonSize);
          
          if (typeof radioEnd !== 'undefined') radioEnd.value(json.radioEnd);
          
          if (typeof radiusSlider !== 'undefined') radiusSlider.value(json.radius);
          if (typeof trackerSlider !== 'undefined') trackerSlider.value(json.tracker);
          if (typeof spiralStartSlider !== 'undefined') spiralStartSlider.value(json.spiralStart);
          if (typeof spinSlider !== 'undefined') spinSlider.value(json.spin);
          
          if (typeof waveSizeSlider !== 'undefined') waveSizeSlider.value(json.waveSize);
          if (typeof waveCountSlider !== 'undefined') waveCountSlider.value(json.waveCount);
          if (typeof waveSpeedSlider !== 'undefined') waveSpeedSlider.value(json.waveSpeed);
          if (typeof slopeSlider !== 'undefined') slopeSlider.value(json.slope);

          if (typeof inp1 !== 'undefined') inp1.value(json.inp1color);
          if (typeof inp2 !== 'undefined') inp2.value(json.inp2color);
          if (typeof inp3 !== 'undefined') inp3.value(json.inp3color);
          if (typeof inp4 !== 'undefined') inp4.value(json.inp4color);
          if (typeof inp5 !== 'undefined') inp5.value(json.inp5color);
          if (json.inp6color && typeof color === 'function') {
              inp6 = color(json.inp6color);
          }
          
          if (typeof inp0check !== 'undefined') inp0check.checked(json.inp0check);
          if (typeof inp1check !== 'undefined') inp1check.checked(json.inp1check);
          if (typeof inp2check !== 'undefined') inp2check.checked(json.inp2check);
          if (typeof inp3check !== 'undefined') inp3check.checked(json.inp3check);
          if (typeof inp4check !== 'undefined') inp4check.checked(json.inp4check);
          if (typeof inp5check !== 'undefined') inp5check.checked(json.inp5check);

          if (typeof inp !== 'undefined') inp.value(json.text);

          if (typeof inpNumber !== 'undefined') inpNumber = json.inpNumber;
          if (typeof bkgdColorPicker !== 'undefined') bkgdColorPicker.value(json.bkgdColor);
          PRESET_SETTINGS = json;
      }
      
      window.getSketchSettings = getSketchSettings;
      window.setSketchSettings = setSketchSettings;
    </script>

    <script src="./js/stg_sc_sync.js" type="module"></script>
    <script>
        function myFunction() {
            alert("SPACE TYPE GENERATOR\n_v.coil 1.0\nDesign and coding by KielM.com\nThanks for using! Let me know what you make.\nkiel.d.m@gmail.com");
        }
    </script>
  </body>
</html>
