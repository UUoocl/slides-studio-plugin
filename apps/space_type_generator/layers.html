<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>STG _v.layers - Display</title>
    <link rel="stylesheet" type="text/css" href="./css/stgStyle2.css" />
    <script src="./js/p5.min.1.1.0.js"></script>
    <script src="./js/sketch_layers.js" type="text/javascript"></script>
    <style>
      body { padding: 0; margin: 0; background: transparent !important; overflow: hidden; }
      canvas { vertical-align: top; }
      /* Hide all UI elements */
      .bottom, .slug, #stg_menu, #obsidian-save-ui-layer { display: none !important; }
    </style>
    </head>
  <body>
    <textarea id="textfield" style="display:none !important;"></textarea>

    <script src="./js/manage_view.js"></script>
    <script src="./js/keyboard_input.js"></script>
    <script id="sketchSettings">
      let hideCanvasUI = true;
      function setSketchSettings(json){
        if (!json) return;
        if (typeof inp !== 'undefined') inp.value(json.text);
        if (typeof strokeColorPicker !== 'undefined') strokeColorPicker.value(json.strokeColor);
        if (typeof textColorPicker !== 'undefined') textColorPicker.value(json.textColor);
        if (typeof blockColorPicker !== 'undefined') blockColorPicker.value(json.blockColor);
        if (typeof bkgdColorPicker !== 'undefined') bkgdColorPicker.value(json.bkgdColor);
        if (typeof innerHSlider !== 'undefined') innerHSlider.value(json.innerH);
        if (typeof innerVSlider !== 'undefined') innerVSlider.value(json.innerV);
        if (typeof rotateFactorSlider !== 'undefined') rotateFactorSlider.value(json.rotateFactor);
        if (typeof stackCountSlider !== 'undefined') stackCountSlider.value(json.stackCount);
        if (typeof fontSizeSlider !== 'undefined') fontSizeSlider.value(json.fontSize);
        PRESET_SETTINGS = json;
      }
    </script>
    <script src="./js/stg_sc_sync.js" type="module"></script>
  </body>
</html>
