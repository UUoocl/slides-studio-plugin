<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Gallery Controller</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }
        h1 { font-size: 1.2rem; margin-bottom: 1rem; color: #fff; }
        .card {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .status-indicator {
            width: 10px; height: 10px; border-radius: 50%; background: #555; display: inline-block; margin-right: 8px;
        }
        .status-indicator.connected { background: #4caf50; box-shadow: 0 0 5px #4caf50; }
        .status-indicator.error { background: #f44336; }
        .status-indicator.waiting { background: #ff9800; }
        
        input, button {
            background: #3d3d3d; border: 1px solid #555; color: #fff; padding: 5px 10px; border-radius: 4px;
        }
        input:focus { outline: none; border-color: #4caf50; }
        button { cursor: pointer; transition: background 0.2s; }
        button:hover { background: #4d4d4d; }
        
        .log-container {
            background: #000; color: #0f0; font-family: monospace; font-size: 0.8rem;
            padding: 10px; border-radius: 4px; height: 150px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all;
        }
        .config-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .config-row label { min-width: 120px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Zoom Gallery Controller</h1>
        
        <div class="config-row">
            <label for="serverPort">Plugin Port:</label>
            <input type="number" id="serverPort" value="57000" style="width: 80px;">
        </div>
        <div class="config-row">
            <label for="oscDevice">OSC Device Name:</label>
            <input type="text" id="oscDevice" value="ZoomOSC" placeholder="e.g. ZoomOSC">
            <button id="saveConfigBtn">Reconnect</button>
        </div>

        <div class="status-row">
            <span>Plugin Server:</span>
            <span><span id="serverStatus" class="status-indicator waiting"></span> <span id="serverStatusText">Waiting...</span></span>
        </div>
        <div class="status-row">
            <span>OBS WebSocket:</span>
            <span><span id="obsStatus" class="status-indicator waiting"></span> <span id="obsStatusText">Waiting...</span></span>
        </div>
        <div class="status-row">
            <span>Current Count:</span>
            <span id="currentCount" style="font-weight: bold; font-size: 1.1em;">-</span>
        </div>
    </div>

    <div class="card">
        <div class="log-container" id="log"></div>
    </div>

        const logDiv = document.getElementById('log');
        const serverStatus = document.getElementById('serverStatus');
        const serverStatusText = document.getElementById('serverStatusText');
        const obsStatus = document.getElementById('obsStatus');
        const obsStatusText = document.getElementById('obsStatusText');
        const currentCountDisplay = document.getElementById('currentCount');
        const serverPortInput = document.getElementById('serverPort');
        const oscDeviceInput = document.getElementById('oscDevice');
        const saveConfigBtn = document.getElementById('saveConfigBtn');

        let isObsConnected = false;
        let socket = null;

        // --- Logging ---
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logDiv.textContent += `[${time}] ${msg}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[ZoomGallery] ${msg}`);
        }

        // --- Config ---
        function loadConfig() {
            serverPortInput.value = localStorage.getItem('zoomGallery_serverPort') || "57000";
            oscDeviceInput.value = localStorage.getItem('zoomGallery_oscDevice') || "ZoomOSC";
        }
        function saveConfig() {
            localStorage.setItem('zoomGallery_serverPort', serverPortInput.value);
            localStorage.setItem('zoomGallery_oscDevice', oscDeviceInput.value);
            startApp();
        }
        saveConfigBtn.addEventListener('click', saveConfig);

        // --- OBS Proxy Helper ---
        async function callObs(requestType, requestData = {}) {
            const port = serverPortInput.value;
            const response = await fetch(`http://127.0.0.1:${port}/api/v1/obs/${requestType}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });
            
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error || `HTTP error ${response.status}`);
            }
            
            return await response.json();
        }

        // --- App Logic ---
        async function startApp() {
            // Cleanup
            if (socket) { socket.close(); socket = null; }

            const port = serverPortInput.value;
            const oscName = oscDeviceInput.value;

            // 1. Check OBS Proxy status
            serverStatus.className = 'status-indicator waiting';
            serverStatusText.textContent = 'Checking...';
            
            try {
                const response = await fetch(`http://127.0.0.1:${port}/api/v1/obs/isconnected`);
                if (!response.ok) throw new Error('Plugin server unreachable');
                const status = await response.json();
                
                serverStatus.className = 'status-indicator connected';
                serverStatusText.textContent = 'Connected to Plugin';
                log('Verified plugin server connection.');

                isObsConnected = status.connected;
                if (isObsConnected) {
                    obsStatus.className = 'status-indicator connected';
                    obsStatusText.textContent = 'Connected (via Proxy)';
                    log('OBS is connected to plugin.');
                } else {
                    obsStatus.className = 'status-indicator error';
                    obsStatusText.textContent = 'OBS Disconnected';
                    log('Warning: OBS is NOT connected to the plugin.');
                }

                // 2. Connect to WebSocket for OSC
                log(`Fetching port for OSC device: ${oscName}`);
                const devResp = await fetch(`http://127.0.0.1:${port}/api/devices`);
                if (!devResp.ok) throw new Error('Failed to fetch devices');
                const devices = await devResp.json();
                const device = devices.osc.find(d => d.name === oscName);

                if (!device || !device.wsPort) {
                    throw new Error(`Port for OSC device ${oscName} not found`);
                }

                log(`Connecting to OSC WebSocket on port ${device.wsPort}`);
                socket = new WebSocket(`ws://127.0.0.1:${device.wsPort}`);
                
                socket.onopen = () => {
                    log('WebSocket Connection opened.');
                };

                socket.onmessage = (event) => {
                    try {
                        const payload = JSON.parse(event.data);
                        // payload format: { deviceName: "...", message: ["/address", args...] }
                        if (payload.message && Array.isArray(payload.message)) {
                            const oscAddress = payload.message[0];
                            const args = payload.message.slice(1);
                            
                            if (oscAddress === '/zoomosc/galleryCount') {
                                const count = args[0];
                                log(`Received Count: ${count}`);
                                currentCountDisplay.textContent = count;
                                applyTransform(count);
                            }
                        }
                    } catch (e) {
                        log('Error parsing message: ' + e.message);
                    }
                };

                socket.onerror = (err) => {
                    log('WebSocket Error.');
                };

                socket.onclose = () => {
                    log('WebSocket closed. Reconnecting in 5s...');
                    setTimeout(startApp, 5000);
                };

            } catch (err) {
                log('Error: ' + err.message);
                serverStatus.className = 'status-indicator error';
                serverStatusText.textContent = 'Error';
                obsStatus.className = 'status-indicator error';
                obsStatusText.textContent = 'Error';
            }
        }

        async function applyTransform(count) {
            if (!isObsConnected) return;

            const galleryCount = parseInt(count);
            const entry = GALLERY_SETTINGS.find(item => item[0] === galleryCount);
            
            if (!entry) {
                log(`No settings found for count: ${galleryCount}`);
                return;
            }

            const transforms = entry[1];
            log(`Updating participant scenes for count: ${galleryCount}`);

            const sceneItemName = "Scene zoom gallery";

            for (let i = 1; i <= 25; i++) {
                const sceneName = `Participant ${i}`;
                const isVisible = i <= galleryCount;
                
                // Use anonymous async function to handle individual source updates
                (async () => {
                    try {
                        const { sceneItemId } = await callObs('GetSceneItemId', {
                            sceneName: sceneName,
                            sourceName: sceneItemName
                        });

                        await callObs('SetSceneItemEnabled', {
                            sceneName: sceneName,
                            sceneItemId: sceneItemId,
                            sceneItemEnabled: isVisible
                        });

                        if (isVisible) {
                            const settingsObj = transforms.find(t => t[sceneName]);
                            if (settingsObj) {
                                const settings = settingsObj[sceneName];
                                await callObs('SetSceneItemTransform', {
                                    sceneName: sceneName,
                                    sceneItemId: sceneItemId,
                                    sceneItemTransform: {
                                        positionX: settings.pos.x,
                                        positionY: settings.pos.y,
                                        scaleX: settings.scale.x,
                                        scaleY: settings.scale.y
                                    }
                                });
                            }
                        }
                    } catch (e) {}
                })();
            }
        }

        // Initialize
        loadConfig();
        startApp();

    </script>
