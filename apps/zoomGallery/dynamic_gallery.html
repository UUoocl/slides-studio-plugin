<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Zoom Gallery</title>
    <!-- Import local libraries -->
    <script src="/apps/lib/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ccc;
            font-family: sans-serif;
            overflow: hidden; /* Prevent scrollbars from p5 canvas */
        }
        #status-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none; /* Let clicks pass through to p5 if needed */
        }
    </style>
</head>
<body>
    <div id="status-overlay">
        <div><strong>Status:</strong> <span id="status-text">Initializing...</span></div>
        <div style="font-size: 0.8em; color: #888;">
            Listening for: /zoomosc/user/emoji<br>
            Thumbs Up (2) -> Closer<br>
            Open Mouth (5) -> Away
        </div>
    </div>

    <script>
        // --- Configuration ---
        const CONFIG = {
            serverUrl: 'http://127.0.0.1:57000',
            obsScene: 'Scene Custom View',
            activeSpeakerName: 'Scene zoom active speaker',
            participantPrefix: 'Participant', // e.g. "Participant 1"
            maxParticipants: 25,
            
            // Geometry
            canvasW: 1920,
            canvasH: 1080,
            
            // Active Speaker Target (Right side)
            targetRect: { x: 1000, y: 315, w: 800, h: 450 }, // Centered vertically in 1080p roughly
            
            // Participant Sizes
            sizeNear: { w: 200, h: 112 },
            sizeFar: { w: 160, h: 90 }, // Slightly smaller when far? Or prompt says "incrementally smaller further away"
            
            // Animation
            lerpSpeed: 0.05,
            attractionStep: 0.25, // How much to move per emoji
            
            // OBS Throttling
            obsUpdateInterval: 5 // Frames between OBS updates (5 = ~12fps updates)
        };

        // --- Globals ---
        let eventSource = null;
        let participants = [];
        let isObsConnected = false;
        let statusElem = document.getElementById('status-text');

        // --- OBS Proxy Helper ---
        async function callObs(requestType, requestData = {}) {
            const response = await fetch(`${CONFIG.serverUrl}/api/v1/obs/${requestType}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });
            
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error || `HTTP error ${response.status}`);
            }
            
            return await response.json();
        }

        // --- Class: Participant ---
        class Participant {
            constructor(id) {
                this.id = id;
                this.sceneItemName = `${CONFIG.participantPrefix} ${id}`;
                
                // Calculate "Home" Grid Position (Left side of screen)
                const cols = 5;
                const col = (id - 1) % cols;
                const row = Math.floor((id - 1) / cols);
                const pad = 20;
                const startX = 50;
                const startY = 100;
                const cellW = 180;
                const cellH = 101;

                this.homePos = createVector(startX + col * (cellW + pad), startY + row * (cellH + pad));
                this.pos = this.homePos.copy();
                
                // Attraction state (0.0 = Home, 1.0 = Active Speaker)
                this.attraction = 0.0;
                this.targetAttraction = 0.0;
                
                // Current visual state
                this.w = CONFIG.sizeFar.w;
                this.h = CONFIG.sizeFar.h;
                
                // OBS Sync state
                this.lastSentPos = createVector(-1, -1);
                this.lastSentScale = -1;
                this.obsItemId = -1; // To be cached
            }

            react(emojiId) {
                // 2 - Thumbs Up (Closer)
                if (emojiId === 2) {
                    this.targetAttraction = min(this.targetAttraction + CONFIG.attractionStep, 1.0);
                }
                // 5 - Open Mouth (Away)
                else if (emojiId === 5) {
                    this.targetAttraction = max(this.targetAttraction - CONFIG.attractionStep, 0.0);
                }
            }

            update() {
                this.attraction = lerp(this.attraction, this.targetAttraction, CONFIG.lerpSpeed);

                const magnetPos = createVector(CONFIG.targetRect.x - 50, CONFIG.targetRect.y + CONFIG.targetRect.h/2);
                
                const destX = lerp(this.homePos.x, magnetPos.x, this.attraction);
                const destY = lerp(this.homePos.y, magnetPos.y, this.attraction);
                
                const stackOffsetX = (this.attraction * 20) * ((this.id % 3) - 1);
                const stackOffsetY = (this.attraction * 20) * (Math.floor(this.id / 3) % 3 - 1);

                this.pos.x = lerp(this.pos.x, destX + stackOffsetX, CONFIG.lerpSpeed);
                this.pos.y = lerp(this.pos.y, destY + stackOffsetY, CONFIG.lerpSpeed);

                this.w = lerp(CONFIG.sizeFar.w, CONFIG.sizeNear.w, this.attraction);
                this.h = lerp(CONFIG.sizeFar.h, CONFIG.sizeNear.h, this.attraction);
            }

            draw() {
                if (this.attraction > 0.01) {
                    stroke(100, 100, 255, 100 * this.attraction);
                    line(this.homePos.x + this.w/2, this.homePos.y + this.h/2, this.pos.x + this.w/2, this.pos.y + this.h/2);
                }

                noStroke();
                fill(lerpColor(color(100), color(0, 255, 0), this.attraction));
                rect(this.pos.x, this.pos.y, this.w, this.h);
                
                fill(255);
                textAlign(CENTER, CENTER);
                text(this.id, this.pos.x + this.w/2, this.pos.y + this.h/2);
            }

            async syncToObs() {
                if (!isObsConnected) return;

                if (dist(this.pos.x, this.pos.y, this.lastSentPos.x, this.lastSentPos.y) < 1.0 && 
                    Math.abs(this.w - this.lastSentScale) < 1.0) {
                    return;
                }

                if (this.obsItemId === -1) {
                    try {
                        const itemResp = await callObs('GetSceneItemId', {
                            sceneName: CONFIG.obsScene,
                            sourceName: this.sceneItemName
                        });
                        this.obsItemId = itemResp.sceneItemId;
                    } catch (e) {
                        return;
                    }
                }

                try {
                    const baseSourceWidth = 1920; 
                    const scaleFactor = this.w / baseSourceWidth;

                    await callObs('SetSceneItemTransform', {
                        sceneName: CONFIG.obsScene,
                        sceneItemId: this.obsItemId,
                        sceneItemTransform: {
                            positionX: this.pos.x,
                            positionY: this.pos.y,
                            scaleX: scaleFactor,
                            scaleY: scaleFactor
                        }
                    });

                    this.lastSentPos = this.pos.copy();
                    this.lastSentScale = this.w;

                } catch (e) {
                    console.error("OBS Update failed", e);
                }
            }
        }

        // --- P5.js Setup & Draw ---
        function setup() {
            createCanvas(CONFIG.canvasW, CONFIG.canvasH);
            
            for (let i = 1; i <= CONFIG.maxParticipants; i++) {
                participants.push(new Participant(i));
            }

            initNetwork();
        }

        function draw() {
            background(30);

            noFill();
            stroke(255, 200, 0);
            strokeWeight(2);
            rect(CONFIG.targetRect.x, CONFIG.targetRect.y, CONFIG.targetRect.w, CONFIG.targetRect.h);
            noStroke();
            fill(255, 200, 0);
            text("Active Speaker", CONFIG.targetRect.x + 10, CONFIG.targetRect.y + 20);

            participants.forEach(p => {
                p.update();
                p.draw();
            });

            if (frameCount % CONFIG.obsUpdateInterval === 0) {
                participants.forEach(p => p.syncToObs());
            }
        }

        // --- Networking ---
        let socket = null;
        async function initNetwork() {
            try {
                const response = await fetch(`${CONFIG.serverUrl}/api/v1/obs/isconnected`);
                if (!response.ok) throw new Error("Plugin Error");
                const status = await response.json();

                isObsConnected = status.connected;
                if (isObsConnected) {
                    statusElem.textContent = "OBS Ready (via Proxy). Waiting for WebSocket...";
                    statusElem.style.color = "#4caf50";
                } else {
                    statusElem.textContent = "OBS Disconnected in Plugin";
                    statusElem.style.color = "orange";
                }

            } catch (e) {
                statusElem.textContent = "Connection Failed: " + e.message;
                statusElem.style.color = "red";
                return;
            }

            const oscName = "ZoomOSC";
            try {
                const devResp = await fetch(`${CONFIG.serverUrl}/api/devices`);
                if (!devResp.ok) throw new Error('Failed to fetch devices');
                const devices = await devResp.json();
                const device = devices.osc.find(d => d.name === oscName);

                if (!device || !device.wsPort) {
                    statusElem.textContent = `OSC Port for ${oscName} not found`;
                    statusElem.style.color = "red";
                    return;
                }

                socket = new WebSocket(`ws://127.0.0.1:${device.wsPort}`);
                
                socket.onopen = () => {
                    statusElem.textContent = "System Ready (OBS Proxy + WS)";
                };

                socket.onmessage = (e) => {
                    handleOscMessage(e.data);
                };

                socket.onerror = (err) => {
                    statusElem.textContent = "WS Error";
                    statusElem.style.color = "red";
                };

                socket.onclose = () => {
                    statusElem.textContent = "WS Closed. Retrying...";
                    setTimeout(initNetwork, 5000);
                };
            } catch (e) {
                console.error("Init network error", e);
                setTimeout(initNetwork, 5000);
            }
        }

        function handleOscMessage(dataStr) {
            try {
                const payload = JSON.parse(dataStr);
                if (payload.message && Array.isArray(payload.message)) {
                    const address = payload.message[0];
                    const args = payload.message.slice(1);

                    if (address === "/zoomosc/user/emojiChanged") {
                        const galleryIndex = parseInt(args[2]);
                        const emojiId = parseInt(args[4]);

                        if (galleryIndex >= 1 && galleryIndex <= CONFIG.maxParticipants) {
                            participants[galleryIndex - 1].react(emojiId);
                        }
                    }
                }
            } catch (e) {
                console.error("Parse Error", e);
            }
        }

        window.onerror = function(msg, source, lineno, colno, error) {
            const div = document.createElement('div');
            div.style.color = 'red';
            div.style.background = 'black';
            div.textContent = `Error: ${msg}`;
            document.body.appendChild(div);
        }

    </script>
</body>
</html>
