<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Shortcuts Bridge - Slides Studio</title>
    <style>
        :root {
            --primary: #007AFF;
            --primary-glow: rgba(0, 122, 255, 0.5);
            --bg: #000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --text: #fff;
            --text-dim: #8e8e93;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a2a2a2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 32px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        textarea {
            height: 100px;
            resize: vertical;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        button:active {
            transform: scale(0.98);
        }

        .log-container {
            margin-top: 32px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-entry {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 13px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .log-entry .time { color: var(--primary); margin-right: 8px; }
        .log-entry .id { color: var(--text-dim); font-size: 11px; }
        .log-entry .data { display: block; margin-top: 4px; color: #a2a2a2; }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Apple Shortcuts</h1>
        <p class="subtitle">Bridge your web interface to native macOS workflows.</p>

        <div class="form-group">
            <label for="shortcutSelect">Shortcut Name</label>
            <select id="shortcutSelect">
                <option value="">Loading shortcuts...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="payload">JSON Payload (Optional)</label>
            <textarea id="payload" placeholder='{"key": "value"}'>{"status": "triggered_from_web"}</textarea>
        </div>

        <button id="runBtn">Run Shortcut</button>

        <div class="log-container">
            <div class="log-header">
                <span>Callback Stream</span>
                <span id="status">Disconnected</span>
            </div>
            <div id="logs"></div>
        </div>
    </div>

    <script type="module">
        import { create } from '../lib/slides-studio-client.js?v=1.0.6';

        const runBtn = document.getElementById('runBtn');
        const shortcutSelect = document.getElementById('shortcutSelect');
        const payloadInput = document.getElementById('payload');
        const logsDiv = document.getElementById('logs');
        const statusSpan = document.getElementById('status');

        const socket = create({
            hostname: window.location.hostname,
            port: window.location.port,
            path: '/websocket/',
            authToken: { name: 'Shortcuts-Utility' }
        });

        socket.on('connect', async () => {
            console.log('[Shortcuts Utility] Socket connected. Socket object:', socket);
            console.log('[Shortcuts Utility] getShortcuts type:', typeof socket.getShortcuts);
            
            statusSpan.textContent = 'Connected';
            statusSpan.style.color = '#34c759';
            socket.subscribe('shortcuts_result');
            
            // Fetch shortcuts list
            try {
                console.log('[Shortcuts Utility] Attempting to fetch shortcuts list...');
                const shortcuts = await socket.getShortcuts();
                console.log('[Shortcuts Utility] Shortcuts received:', shortcuts);
                shortcutSelect.innerHTML = shortcuts.map(s => `<option value="${s}">${s}</option>`).join('');
                if (shortcuts.length === 0) {
                    shortcutSelect.innerHTML = '<option value="">No shortcuts found (check settings)</option>';
                }
            } catch (err) {
                shortcutSelect.innerHTML = `<option value="">Error: ${err.message}</option>`;
            }
        });

        socket.on('disconnect', () => {
            statusSpan.textContent = 'Disconnected';
            statusSpan.style.color = '#ff3b30';
        });

        socket.on('shortcuts_result', (data) => {
            console.log('[Shortcuts Utility] Result received:', data);
            addLog(data.id, data.data);
        });

        function addLog(id, data) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `
                <span class="time">${time}</span>
                <span class="id">ID: ${id}</span>
                <span class="data">${JSON.stringify(data)}</span>
            `;
            logsDiv.prepend(entry);
        }

        runBtn.onclick = async () => {
            const name = shortcutSelect.value;
            if (!name) {
                alert('Please select a shortcut');
                return;
            }

            let payload = {};
            try {
                if (payloadInput.value.trim()) {
                    payload = JSON.parse(payloadInput.value);
                }
            } catch (e) {
                alert('Invalid JSON in payload');
                return;
            }

            runBtn.disabled = true;
            runBtn.textContent = 'Triggering...';

            try {
                const result = await socket.runShortcut(name, payload);
                console.log('Shortcut triggered:', result);
                addLog(result.requestId, { info: 'Shortcut triggered successfully' });
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                runBtn.disabled = false;
                runBtn.textContent = 'Run Shortcut';
            }
        };
    </script>
</body>
</html>
